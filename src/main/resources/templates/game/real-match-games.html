<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/userDefault}"
>
  <head>
    <title>Real Match Games - BaseBall LOCK</title>
    <style>
      .games-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem;
      }
      
      .page-header {
        text-align: center;
        margin-bottom: 3rem;
      }
      
      .page-title {
        font-size: 2.2rem;
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 0.5rem;
      }
      
      .page-subtitle {
        color: #7f8c8d;
        font-size: 1.1rem;
      }
      
      .game-card {
        background: white;
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s ease;
      }
      
      .game-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
      }
      
      .game-teams {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      
      .team {
        text-align: center;
        flex: 1;
      }
      
      .team-name {
        font-size: 1.3rem;
        font-weight: bold;
        color: #2c3e50;
      }
      
      .vs {
        font-size: 1.5rem;
        font-weight: bold;
        color: #e74c3c;
        margin: 0 1rem;
      }
      
      .game-info {
        text-align: center;
        color: #7f8c8d;
        margin-bottom: 1rem;
      }
      
      .action-buttons {
        text-align: center;
      }
      
      .btn-lineup {
        background: linear-gradient(135deg, #27ae60, #229954);
        color: white;
        border: none;
        padding: 0.7rem 1.5rem;
        border-radius: 25px;
        text-decoration: none;
        margin: 0 0.5rem;
        transition: all 0.3s ease;
      }
      
      .btn-lineup:hover {
        background: linear-gradient(135deg, #229954, #1e8449);
        color: white;
        transform: scale(1.05);
      }
      
      .empty-state {
        text-align: center;
        padding: 3rem;
        color: #7f8c8d;
      }
      
      .back-btn {
        background: linear-gradient(135deg, #95a5a6, #7f8c8d);
        color: white;
        border: none;
        padding: 0.7rem 1.5rem;
        border-radius: 25px;
        text-decoration: none;
        margin-bottom: 2rem;
        display: inline-block;
        transition: all 0.3s ease;
      }
      
      .back-btn:hover {
        background: linear-gradient(135deg, #7f8c8d, #6c7b7d);
        color: white;
        transform: scale(1.05);
      }
    </style>
  </head>

  <th:block layout:fragment="contents">
    <div class="games-container">
      <a href="/real-match" class="back-btn">← 뒤로 가기</a>
      
      <div class="page-header">
        <h1 class="page-title">⚾ 전날 경기 목록</h1>
        <p class="page-subtitle">원하는 경기를 선택해서 라인업을 확인하고 시뮬레이션해보세요</p>
      </div>

      <div th:if="${error}" class="alert alert-danger text-center">
        <i class="bi bi-exclamation-triangle"></i>
        <span th:text="${error}">오류가 발생했습니다.</span>
      </div>

      <div th:if="${games != null and gamesCount > 0}">
        <div th:each="game : ${games}" class="game-card">
          <div class="game-teams">
            <div class="team">
              <div class="team-name" th:text="${game.awayTeam}">원정팀</div>
            </div>
            <div class="vs">VS</div>
            <div class="team">
              <div class="team-name" th:text="${game.homeTeam}">홈팀</div>
            </div>
          </div>
          
          <div class="game-info">
            <div>
              <i class="bi bi-calendar"></i>
              <span th:text="${game.gameDate}">2024-07-14</span>
            </div>
            <div>
              <i class="bi bi-geo-alt"></i>
              <span th:text="${game.stadium}">경기장</span>
            </div>
          </div>
          
          <div class="action-buttons">
            <a th:href="@{/real-match/lineup/{gameId}(gameId=${game.gameId})}" class="btn-lineup">
              라인업 보기 & 시뮬레이션
            </a>
          </div>
        </div>
      </div>

      <div th:if="${games == null or gamesCount == 0}" class="empty-state">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🤔</div>
        <h3>경기 정보를 불러올 수 없습니다</h3>
        <p>전날 경기 데이터를 가져오는 중 문제가 발생했습니다.<br>잠시 후 다시 시도해주세요.</p>
      </div>
    </div>
  </th:block>
</html>
