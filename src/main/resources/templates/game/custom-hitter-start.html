<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/userDefault}"
>
  <head>
    <title>커스텀 선수 게임 시작 - BaseBall LOCK</title>
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: 'Pretendard', sans-serif;
        min-height: 100vh;
      }
      
      .game-start-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }
      
      .player-card {
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
        margin-bottom: 2rem;
      }
      
      .player-avatar {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3498db, #2980b9);
        margin: 0 auto 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: white;
        border: 4px solid #fff;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        overflow: hidden;
      }
      
      .avatar-generated {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      
      .player-name {
        font-size: 2rem;
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 0.5rem;
      }
      
      .player-details {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 1rem;
        margin: 1.5rem 0;
      }
      
      .detail-item {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 1rem;
      }
      
      .detail-label {
        font-size: 0.9rem;
        color: #6c757d;
        margin-bottom: 0.3rem;
      }
      
      .detail-value {
        font-size: 1.2rem;
        font-weight: bold;
        color: #495057;
      }
      
      .stats-section {
        background: #e9ecef;
        border-radius: 15px;
        padding: 1.5rem;
        margin-top: 1.5rem;
      }
      
      .stats-title {
        font-size: 1.3rem;
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 1rem;
        text-align: center;
      }
      
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
      
      .stat-item {
        background: white;
        border-radius: 10px;
        padding: 1rem;
        text-align: center;
      }
      
      .stat-label {
        font-size: 0.9rem;
        color: #6c757d;
        margin-bottom: 0.3rem;
      }
      
      .stat-value {
        font-size: 1.8rem;
        font-weight: bold;
        color: #495057;
      }
      
      .rookie-note {
        background: #fff3cd;
        border: 1px solid #ffeaa7;
        border-radius: 10px;
        padding: 1rem;
        margin-top: 1rem;
        color: #856404;
        font-size: 0.9rem;
        text-align: center;
      }
      
      .action-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 2rem;
      }
      
      .btn-start-game {
        background: linear-gradient(135deg, #28a745, #20c997);
        color: white;
        border: none;
        border-radius: 15px;
        padding: 1.2rem 2.5rem;
        font-size: 1.2rem;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
      }
      
      .btn-start-game:hover {
        background: linear-gradient(135deg, #20c997, #17a2b8);
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(40, 167, 69, 0.3);
        color: white;
      }
      
      .btn-edit {
        background: #6c757d;
        color: white;
        border: none;
        border-radius: 15px;
        padding: 1.2rem 2rem;
        font-size: 1.1rem;
        text-decoration: none;
        transition: all 0.3s ease;
      }
      
      .btn-edit:hover {
        background: #5a6268;
        color: white;
        transform: translateY(-2px);
      }
      
      .welcome-title {
        color: white;
        text-align: center;
        margin-bottom: 2rem;
        font-size: 2.5rem;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      }
    </style>
  </head>

  <th:block layout:fragment="contents">
    <div class="game-start-container">
      <h1 class="welcome-title">⚾ 선수 생성 완료!</h1>
      
      <div class="player-card" th:if="${session.customPlayer}">
        <div class="player-avatar">
          <img th:if="${session.customPlayer.avatarUrl}" 
               th:src="${session.customPlayer.avatarUrl}" 
               class="avatar-generated"
               alt="선수 아바타">
          <span th:unless="${session.customPlayer.avatarUrl}">👤</span>
        </div>
        
        <div class="player-name" th:text="${session.customPlayer.name}">선수 이름</div>
        
        <div class="player-details">
          <div class="detail-item">
            <div class="detail-label">나이</div>
            <div class="detail-value" th:text="${session.customPlayer.age + '세'}">25세</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">성별</div>
            <div class="detail-value" th:text="${session.customPlayer.gender == 'male' ? '남성' : '여성'}">남성</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">타석</div>
            <div class="detail-value" th:text="${session.customPlayer.batting == 'right' ? '우타' : (session.customPlayer.batting == 'left' ? '좌타' : '스위치')}">우타</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">신장</div>
            <div class="detail-value" th:text="${session.customPlayer.height + 'cm'}">180cm</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">몸무게</div>
            <div class="detail-value" th:text="${session.customPlayer.weight + 'kg'}">75kg</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">포지션</div>
            <div class="detail-value" th:text="${session.customPlayer.position}">CF</div>
          </div>
        </div>
        
        <div class="stats-section">
          <div class="stats-title">🔥 초기 능력치</div>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-label">파워</div>
              <div class="stat-value" th:text="${session.customPlayer.stats.power}">45</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">컨택</div>
              <div class="stat-value" th:text="${session.customPlayer.stats.contact}">52</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">스피드</div>
              <div class="stat-value" th:text="${session.customPlayer.stats.speed}">38</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">수비</div>
              <div class="stat-value" th:text="${session.customPlayer.stats.defense}">41</div>
            </div>
          </div>
          
          <div class="rookie-note">
            <strong>💡 신인 선수</strong><br>
            능력치가 낮아도 걱정하지 마세요! 게임을 통해 경험을 쌓고 훈련하면 능력치가 성장합니다.
          </div>
        </div>
      </div>
      
      <div class="action-buttons">
        <a href="/game/custom-hitter-play" class="btn-start-game">
          🎮 게임 시작하기
        </a>
        <a href="/game/custom-hitter-mode" class="btn-edit">
          ✏️ 선수 수정하기
        </a>
      </div>
    </div>
  </th:block>
</html>
