<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/userDefault}">
<head>
    <title>Real Match Mode - BaseBall LOCK</title>
    <style>
        .real-match-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .match-date-selector {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .match-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .match-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-color: #e74c3c;
        }

        .match-card.selected {
            border-color: #e74c3c;
            background: #fff5f5;
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 0.5rem;
            background: #f8f9fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .team-logo img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .team-name {
            font-weight: bold;
            color: #333;
        }

        .team-score {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .team-score.winner {
            color: #e74c3c;
        }

        .team-score.loser {
            color: #6c757d;
        }

        .vs-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e74c3c;
            margin: 0 1rem;
        }

        .match-info {
            text-align: center;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .match-time {
            color: #666;
            font-size: 0.9rem;
        }

        .match-stadium {
            color: #888;
            font-size: 0.8rem;
        }

        .match-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .status-finished, .completed {
            background: #d4edda;
            color: #155724;
        }

        .status-live {
            background: #f8d7da;
            color: #721c24;
        }
        
        .cancelled {
            background: #f8d7da;
            color: #721c24;
        }
        
        .scheduled {
            background: #fff3cd;
            color: #856404;
        }

        .no-matches {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .start-simulation-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 1rem 3rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 2rem auto;
            min-width: 200px;
        }

        .start-simulation-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .start-simulation-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>

<th:block layout:fragment="contents">
    <div class="real-match-container">
        <div class="page-header">
            <h1 class="page-title">⚾ Real Match Mode</h1>
            <p class="page-subtitle">실제 KBO 경기를 기반으로 시뮬레이션을 진행하세요!</p>
        </div>

        <div class="match-date-selector">
            <h3 style="text-align: center; margin-bottom: 1.5rem;" th:text="${formattedGameDate + ' 경기'}">경기 목록</h3>

            <div id="matchesContainer">
                <div class="matches-grid" id="matchesGrid">
                    <!-- 어제 경기 목록 -->
                    <div th:each="game : ${yesterdayGames}" class="match-card" 
                         th:data-match-id="${game.id}"
                         th:data-home-team="${game.homeTeamId}"
                         th:data-away-team="${game.awayTeamId}">
                        
                        <div class="match-teams">
                            <div class="team home-team">
                                <div class="team-logo">
                                    <img th:src="@{'/static/emblems/' + ${@teamService.getTeamLogoById(game.homeTeamId)} + '.svg'}"
                                         th:alt="${@teamService.getTeamById(game.homeTeamId).name + ' 로고'}"
                                         onerror="this.src='/static/emblems/kbo.png'">
                                </div>
                                <div class="team-name" th:text="${@teamService.getTeamById(game.homeTeamId).name}">홈팀</div>
                                <div class="team-score" 
                                     th:classappend="${game.homeTeamScore != null and game.awayTeamScore != null and game.homeTeamScore > game.awayTeamScore ? 'winner' : (game.homeTeamScore != null and game.awayTeamScore != null and game.homeTeamScore < game.awayTeamScore ? 'loser' : '')}"
                                     th:text="${game.homeTeamScore != null ? game.homeTeamScore : '-'}">0</div>
                            </div>
                            
                            <div class="vs-separator">VS</div>
                            
                            <div class="team away-team">
                                <div class="team-logo">
                                    <img th:src="@{'/static/emblems/' + ${@teamService.getTeamLogoById(game.awayTeamId)} + '.svg'}"
                                         th:alt="${@teamService.getTeamById(game.awayTeamId).name + ' 로고'}"
                                         onerror="this.src='/static/emblems/kbo.png'">
                                </div>
                                <div class="team-name" th:text="${@teamService.getTeamById(game.awayTeamId).name}">원정팀</div>
                                <div class="team-score" 
                                     th:classappend="${game.awayTeamScore != null and game.homeTeamScore != null and game.awayTeamScore > game.homeTeamScore ? 'winner' : (game.awayTeamScore != null and game.homeTeamScore != null and game.awayTeamScore < game.homeTeamScore ? 'loser' : '')}"
                                     th:text="${game.awayTeamScore != null ? game.awayTeamScore : '-'}">0</div>
                            </div>
                        </div>
                        
                        <div class="match-info">
                            <div class="match-time" th:text="${#dates.format(game.matchDate, 'HH:mm')}">14:00</div>
                            <div class="match-stadium" th:text="${game.stadium}">잠실야구장</div>
                            <div class="match-status" 
                                 th:classappend="${game.status == '취소' ? 'cancelled' : (game.status == '종료' ? 'completed' : 'scheduled')}"
                                 th:text="${game.status == '취소' ? '경기 취소' : (game.status == '종료' ? '경기 종료' : '예정')}">
                                경기 종료
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="noMatches" class="no-matches" th:style="${#lists.isEmpty(yesterdayGames)} ? 'display: block;' : 'display: none;'">
                    <h4>😔 <span th:text="${formattedGameDate}">어제</span> 경기가 없습니다</h4>
                    <p th:if="${gameDate.dayOfWeek.value == 1}">월요일은 일반적으로 경기가 없는 날입니다.</p>
                    <p th:unless="${gameDate.dayOfWeek.value == 1}">다른 날짜를 선택해보세요.</p>
                </div>
            </div>

            <button id="startSimulation" class="start-simulation-btn" disabled>
                🎮 시뮬레이션 시작
            </button>
        </div>
    </div>
</th:block>

<th:block layout:fragment="script">
    <script>
        let selectedMatch = null;
        let matchesData = [];

        $(document).ready(function() {
            console.log('Real Match Mode 초기화');
            
            // 경기 카드 이벤트 설정
            setupMatchCardEvents();

            // 시뮬레이션 시작 버튼
            $('#startSimulation').on('click', function() {
                if (selectedMatch) {
                    startSimulation(selectedMatch);
                }
            });
        });

        function setupMatchCardEvents() {
            $('.match-card').on('click', function() {
                $('.match-card').removeClass('selected');
                $(this).addClass('selected');
                
                selectedMatch = {
                    id: $(this).data('match-id'),
                    homeTeamId: $(this).data('home-team'),
                    awayTeamId: $(this).data('away-team'),
                    homeTeamName: $(this).find('.home-team .team-name').text(),
                    awayTeamName: $(this).find('.away-team .team-name').text(),
                    stadium: $(this).find('.match-stadium').text(),
                    time: $(this).find('.match-time').text()
                };
                
                $('#startSimulation').prop('disabled', false);
                console.log('경기 선택:', selectedMatch);
            });
        }

        function startSimulation(match) {
            console.log('시뮬레이션 시작:', match);
            
            // 선택된 경기 정보를 서버로 전송하고 시뮬레이션 페이지로 이동
            const matchData = {
                statizId: match.statizId || match.id, // statizId 우선, 없으면 id 사용
                homeTeamName: match.homeTeamName,
                awayTeamName: match.awayTeamName,
                gameMode: 'real-match'
            };

            // 실제 시뮬레이션 페이지로 이동
            alert(`${match.awayTeamName} vs ${match.homeTeamName} 시뮬레이션을 시작합니다!`);
            window.location.href = '/game/play'; // 임시로 기본 플레이 화면으로 이동
        }
    </script>
</th:block>
</html>
