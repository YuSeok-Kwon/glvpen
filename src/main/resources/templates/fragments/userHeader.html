<header
  class="d-flex align-items-center px-3 px-md-4"
  th:classappend="${session.loginUser != null and session.loginUser.favoriteTeamId != null ? ' team-bg-' + session.loginUser.favoriteTeamId : ' team-bg-1'}"
  style="width: 100%; height: 64px; position: sticky; top: 0; z-index: 1030;"
>

  <!-- 로고 -->
  <div class="d-flex align-items-center me-auto">
    <a href="/user/home" class="text-decoration-none d-flex flex-column">
      <span class="logo-main">glvpen</span>
      <span class="logo-sub d-none d-sm-inline">글러브와 펜</span>
    </a>
  </div>

  <!-- 데스크탑 네비게이션 -->
  <nav class="d-none d-md-flex align-items-center gap-4 fs-6 me-4">
    <a href="/schedule/result-view" class="team-nav-link">일정/결과</a>
    <a href="/ranking/teamranking-view" class="team-nav-link">랭킹</a>
    <a href="/analysis" class="team-nav-link">분석</a>
    <a href="/game/home-view" class="team-nav-link">시뮬레이션</a>
    <a href="/user/locker-room" class="team-nav-link">락커룸</a>
  </nav>

  <!-- 유저 정보 -->
  <div class="d-none d-md-flex align-items-center gap-2 team-text">
    <span class="small fw-bold d-none d-sm-inline"
          th:text="${session.loginUser != null ? session.loginUser.nickname + ' 님' : '게스트 님'}"
          >권유석 님</span>
    <a href="/user/logout" class="small text-white">로그아웃</a>
  </div>

  <!-- 모바일 햄버거 메뉴 버튼 -->
  <button class="d-md-none btn p-1" type="button"
          data-bs-toggle="offcanvas" data-bs-target="#userMobileMenu"
          aria-controls="userMobileMenu"
          style="border: none; color: white; font-size: 1.5rem;">
    <i class="bi bi-list"></i>
  </button>

  <!-- 모바일 오프캔버스 메뉴 -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="userMobileMenu"
       aria-labelledby="userMobileMenuLabel"
       style="max-width: 280px;"
       th:classappend="${session.loginUser != null and session.loginUser.favoriteTeamId != null ? ' team-bg-' + session.loginUser.favoriteTeamId : ' team-bg-1'}">
    <div class="offcanvas-header border-bottom" style="border-color: rgba(255,255,255,0.15) !important;">
      <div>
        <span class="logo-main" id="userMobileMenuLabel">glvpen</span>
        <div class="logo-sub">글러브와 펜</div>
      </div>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column gap-1 pt-3">
      <a href="/schedule/result-view" class="team-nav-link d-block py-2 px-3 rounded" style="font-size: 1.1rem;">일정/결과</a>
      <a href="/ranking/teamranking-view" class="team-nav-link d-block py-2 px-3 rounded" style="font-size: 1.1rem;">랭킹</a>
      <a href="/analysis" class="team-nav-link d-block py-2 px-3 rounded" style="font-size: 1.1rem;">분석</a>
      <a href="/game/home-view" class="team-nav-link d-block py-2 px-3 rounded" style="font-size: 1.1rem;">시뮬레이션</a>
      <a href="#" class="team-nav-link d-block py-2 px-3 rounded" style="font-size: 1.1rem;">락커룸</a>
      <hr style="border-color: rgba(255,255,255,0.15);">
      <div class="px-3 team-text">
        <span class="small fw-bold"
              th:text="${session.loginUser != null ? session.loginUser.nickname + ' 님' : '게스트 님'}"
              >권유석 님</span>
        <a href="/user/logout" class="small text-white d-block mt-1">로그아웃</a>
      </div>
    </div>
  </div>

</header>
