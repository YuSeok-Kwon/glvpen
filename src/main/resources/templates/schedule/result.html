<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="contents">
  <div class="container py-5">
    
    
        
    <!-- 월 이동 -->
    <div class="text-center mb-4 d-flex flex-column flex-sm-row align-items-center justify-content-center gap-2">
      <a th:href="@{/schedule/result-view(year=${prevYear}, month=${prevMonth})}" class="btn btn-outline-secondary order-1 order-sm-0" style="background-color: #FACC15;">&laquo; 이전</a>	  
	  <strong class="fs-3 fs-md-3 month-title order-0 order-sm-1" onclick="openDatePicker(this)" 
              th:text="${year + '년 ' + month + '월'}">2025년 4월</strong>
      <!-- 달력용 input -->
      <input type="date" id="hiddenDatePicker" class="d-none" onchange="goToSelectedDate()" />      
      <a th:href="@{/schedule/result-view(year=${nextYear}, month=${nextMonth})}" class="btn btn-outline-secondary order-2" style="background-color: #FACC15;">다음 &raquo;</a>
    </div>

    <!-- 날짜별 카드 -->
    <div th:each="entry : ${groupedSchedule}" class="mb-4">
      <div class="card shadow-sm">

        <!-- 날짜 헤더 -->
        <div class="card-header bg-warning text-dark fw-bold fs-5 py-2"
		     th:text="${#temporals.format(entry.key, 'M월 d일 (E)')}">
		  4월 20일 (일)
		</div>
        
        <!-- 카드 바디 -->
        <div class="card-body px-3 py-2">

          <!-- 경기 한 줄 -->
          <div th:each="game : ${entry.value}" class="mb-3 border-bottom pb-2"
               th:style="${game.statizId != null} ? 'cursor: pointer;' : 'cursor: not-allowed; opacity: 0.6;'"
               th:onclick="${game.statizId != null} ? |location.href='@{/schedule/detail-view(statizId=${game.statizId})}'| : ''">

            <!-- 경기 시간 & 경기장 & 더블헤더 표시 -->
            <div class="d-flex justify-content-center align-items-center gap-2 text-muted fs-6 ps-3 mt-2">
              <!-- 경기 시간 -->
              <span class="fw-bold" th:text="${game.matchTime}">18:30</span>

              <!-- 더블헤더 배지 -->
              <span th:if="${game.isDoubleHeader != null && game.isDoubleHeader}"
                    class="badge bg-danger text-white"
                    th:text="${game.doubleHeaderSeq == 1} ? '1차전' : '2차전'">
                1차전
              </span>

              <!-- 경기장 -->
              <span th:text="${game.stadium}">서울 잠실야구장</span>
            </div>

            <!-- 팀 & VS 정보 -->
            <div class="row align-items-center">

              <!-- 원정팀 -->
              <div class="col-5 text-end d-flex align-items-center justify-content-end gap-1 gap-md-2 fs-4 fs-md-3">
				  <span th:classappend="${game.awayTeamScore > game.homeTeamScore} ? 'fw-bold' : 'fw-light'">
				    <span th:text="${game.awayTeamName}">SSG</span>
				    <span th:if="${game.awayTeamScore != null}" th:text="'(' + ${game.awayTeamScore} + ')'"> (2)</span>
				  </span>
				  <img th:src="@{/static/emblems/{logo}.svg(logo=${game.awayTeamLogo})}" class="table-team-logo">  
			  </div>
              <!-- VS -->
              <div class="col-2 text-center text-secondary fs-4 fs-md-3 fw-bold">VS</div>

              <!-- 홈팀 -->
              <div class="col-5 text-start d-flex align-items-center justify-content-start gap-1 gap-md-2 fs-4 fs-md-3">
				  <img th:src="@{/static/emblems/{logo}.svg(logo=${game.homeTeamLogo})}" class="table-team-logo">
				  <span th:classappend="${game.homeTeamScore > game.awayTeamScore} ? 'fw-bold' : 'fw-light'">
				      <span th:if="${game.homeTeamScore != null}" th:text="'(' + ${game.homeTeamScore} + ')'"> (3)</span>
				      <span th:text="${game.homeTeamName}">두산</span>
				  </span>
			  </div>

            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</th:block>
<th:block layout:fragment="script">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/ko.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">
<script>
flatpickr.localize(flatpickr.l10ns.ko);
const flatpickrInstance = flatpickr("#hiddenDatePicker", {
    dateFormat: "Y-m-d",
    locale : "ko",
    plugins: [
        new monthSelectPlugin({
            shorthand: false,
            dateFormat: "Y-m-d",
            altFormat: "Y년 m월"
        })
    ],
    onChange: function(selectedDates, dateStr) {
        if (dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            window.location.href = `/schedule/result-view?year=${year}&month=${month}`;
        }
    }
});
	
function openDatePicker(el) {
    flatpickrInstance._positionElement = el;
    flatpickrInstance.open();
}
</script>
</th:block>
