<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/default}"
>
  <head>
    <title>Real Match - 오늘의 경기 - BaseBall LOCK</title>
  </head>
  <body>
    <th:block layout:fragment="contents">
      <div class="container py-5">
        <div class="row mb-4">
          <div class="col-12">
            <h1 class="display-4 mb-3">
              <i class="bi bi-calendar-event"></i> 오늘의 KBO 경기
            </h1>
            <p class="lead text-muted">
              실제 KBO 경기를 시뮬레이션하고 결과를 예측해보세요
            </p>
          </div>
        </div>

        <!-- 날짜 선택 -->
        <div class="row mb-4">
          <div class="col-md-6">
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-calendar3"></i>
              </span>
              <input
                type="date"
                class="form-control"
                id="matchDate"
                value=""
              />
              <button class="btn btn-primary" onclick="loadMatchesByDate()">
                <i class="bi bi-search"></i> 조회
              </button>
            </div>
          </div>
          <div class="col-md-6 text-end">
            <button class="btn btn-outline-secondary" onclick="loadTodayMatches()">
              <i class="bi bi-arrow-clockwise"></i> 오늘 경기
            </button>
          </div>
        </div>

        <!-- 경기 목록 -->
        <div class="row" id="matchList">
          <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">로딩 중...</span>
            </div>
            <p class="mt-3 text-muted">경기 일정을 불러오는 중...</p>
          </div>
        </div>

        <!-- 경기가 없을 때 -->
        <div class="row d-none" id="emptyState">
          <div class="col-12 text-center py-5">
            <i class="bi bi-calendar-x display-1 text-muted"></i>
            <p class="mt-3 text-muted">해당 날짜에 예정된 경기가 없습니다.</p>
          </div>
        </div>
      </div>
    </th:block>

    <th:block layout:fragment="script">
      <script th:inline="javascript">
        // 페이지 로드 시 오늘 경기 로드
        $(document).ready(function () {
          // 오늘 날짜 설정
          const today = new Date().toISOString().split('T')[0];
          $('#matchDate').val(today);

          loadTodayMatches();
        });

        // 오늘 경기 로드
        function loadTodayMatches() {
          const today = new Date().toISOString().split('T')[0];
          $('#matchDate').val(today);
          loadMatchesByDate();
        }

        // 날짜별 경기 로드
        function loadMatchesByDate() {
          const selectedDate = $('#matchDate').val();

          if (!selectedDate) {
            alert('날짜를 선택해주세요.');
            return;
          }

          // 로딩 상태 표시
          $('#matchList').html(`
            <div class="col-12 text-center py-5">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">로딩 중...</span>
              </div>
              <p class="mt-3 text-muted">경기 일정을 불러오는 중...</p>
            </div>
          `);
          $('#emptyState').addClass('d-none');

          // Mock 데이터 (실제로는 API 호출)
          // TODO: 실제 Schedule API 연동 필요
          setTimeout(() => {
            const mockMatches = generateMockMatches(selectedDate);

            if (mockMatches.length > 0) {
              renderMatches(mockMatches);
            } else {
              showEmptyState();
            }
          }, 500);
        }

        // Mock 경기 데이터 생성
        function generateMockMatches(date) {
          // TODO: 실제 API로 교체
          return [
            {
              id: 1,
              homeTeam: 'KIA 타이거즈',
              awayTeam: '삼성 라이온즈',
              stadium: '광주-기아 챔피언스 필드',
              matchTime: '18:30',
              status: 'SCHEDULED',
            },
            {
              id: 2,
              homeTeam: 'LG 트윈스',
              awayTeam: '두산 베어스',
              stadium: '잠실야구장',
              matchTime: '18:30',
              status: 'SCHEDULED',
            },
          ];
        }

        // 경기 목록 렌더링
        function renderMatches(matches) {
          let html = '';

          matches.forEach((match) => {
            const statusBadge = getStatusBadge(match.status);

            html += `
              <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                  <div class="card-header bg-primary text-white">
                    <div class="d-flex justify-content-between align-items-center">
                      <span><i class="bi bi-geo-alt"></i> ${match.stadium}</span>
                      <span><i class="bi bi-clock"></i> ${match.matchTime}</span>
                    </div>
                  </div>
                  <div class="card-body">
                    <div class="row align-items-center text-center">
                      <div class="col-5">
                        <h4 class="mb-0">${match.homeTeam}</h4>
                        <small class="text-muted">홈</small>
                      </div>
                      <div class="col-2">
                        <h3 class="mb-0">VS</h3>
                      </div>
                      <div class="col-5">
                        <h4 class="mb-0">${match.awayTeam}</h4>
                        <small class="text-muted">원정</small>
                      </div>
                    </div>

                    <div class="mt-3 text-center">
                      ${statusBadge}
                    </div>
                  </div>
                  <div class="card-footer bg-transparent">
                    <div class="d-grid gap-2">
                      <a href="/realmatch/predict?matchId=${match.id}" class="btn btn-primary">
                        <i class="bi bi-controller"></i> 시뮬레이션 시작
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            `;
          });

          $('#matchList').html(html);
          $('#emptyState').addClass('d-none');
        }

        // 상태 뱃지 가져오기
        function getStatusBadge(status) {
          switch (status) {
            case 'SCHEDULED':
              return '<span class="badge bg-info">경기 예정</span>';
            case 'LIVE':
              return '<span class="badge bg-danger">경기 중</span>';
            case 'FINISHED':
              return '<span class="badge bg-secondary">경기 종료</span>';
            case 'CANCELED':
              return '<span class="badge bg-warning text-dark">경기 취소</span>';
            default:
              return '<span class="badge bg-secondary">-</span>';
          }
        }

        // 빈 상태 표시
        function showEmptyState() {
          $('#matchList').html('');
          $('#emptyState').removeClass('d-none');
        }
      </script>
    </th:block>
  </body>
</html>
