<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/userDefault}">
      
<head>
    <style>
    .calendar-table {
	  width: 100%;
	  table-layout: fixed;
	  min-width: 800px;
	}
	.calendar-table th, .calendar-table td {
	  padding: 0.5rem;
	  overflow: hidden;
	  text-overflow: ellipsis;
	  white-space: nowrap;
	}
	.custom-cell {
	  position: relative;
	  height: 140px;
	  overflow: hidden;
	  white-space: normal;
	}
	
	@media (max-width: 768px) {
	  .calendar-table {
	    min-width: 600px;
	  }
	  .calendar-table th, .calendar-table td {
	    padding: 0.25rem;
	    font-size: 0.8rem;
	  }
	  .custom-cell {
	    height: 100px;
	  }
	}
	
	@media (max-width: 480px) {
	  .calendar-table {
	    min-width: 500px;
	  }
	  .calendar-table th, .calendar-table td {
	    padding: 0.2rem;
	    font-size: 0.7rem;
	  }
	  .custom-cell {
	    height: 80px;
	  }
	}
	
	/* 기본적으로 축약 팀 이름 표시 */
	.team-name-short {
	  display: block;
	}
	.team-name-full {
	  display: none;
	}
	
	/* 버튼 반응형 크기 조절 */
	.btn-sm {
	  font-size: 0.875rem;
	  padding: 0.25rem 0.5rem;
	}
	
	@media (max-width: 768px) {
	  .btn-sm {
	    font-size: 0.75rem;
	    padding: 0.2rem 0.4rem;
	  }
	}
	
	@media (max-width: 480px) {
	  .btn-sm {
	    font-size: 0.7rem;
	    padding: 0.15rem 0.3rem;
	  }
	}
    </style>
</head>

<th:block layout:fragment="contents" >
<div class="container-fluid py-5 d-flex flex-column justify-content-center" 
     style="background-color: white;">
  <!-- 상단 연/월 + 이동 버튼 -->
  <div class="d-flex justify-content-center align-items-center mb-4 gap-2 gap-md-4">
    <a th:href="@{/review/calendar-view(year=${prevYear}, month=${prevMonth})}" class="btn btn-outline-light">&laquo;</a>
    <h2 id="calendar-title" class="fs-4 fs-md-2 text-center" th:text="${year} + '년 ' + ${month} + '월'">2025년 4월</h2>
    <a th:href="@{/review/calendar-view(year=${nextYear}, month=${nextMonth})}" class="btn btn-outline-light">&raquo;</a>
  </div>
	
  	<!-- 달력 테이블 -->
  	<div class="table-responsive">
    <table class="table table-bordered table-hover table-striped text-center calendar-table">
	  <thead class="table-light">
	    <tr>
	      <th th:style="'border: 1px solid ' + ${teamColor}">월</th>
	      <th th:style="'border: 1px solid ' + ${teamColor}">화</th>
	      <th th:style="'border: 1px solid ' + ${teamColor}">수</th>
	      <th th:style="'border: 1px solid ' + ${teamColor}">목</th>
	      <th th:style="'border: 1px solid ' + ${teamColor}">금</th>
	      <th class="text-primary" th:style="'border: 1px solid ' + ${teamColor}">토</th>
	      <th class="text-danger" th:style="'border: 1px solid ' + ${teamColor}">일</th>
	      <th th:style="'border: 1px solid ' + ${teamColor}">요약</th>
	    </tr>
	  </thead>
	
	  <tbody>
	    <tr th:each="week : ${calendar}">
	      <!-- 요일별 셀 -->
	      <th:block th:each="day : ${week}">
	        <td class="align-top position-relative text-center bg-white custom-cell"
                th:style="'border: 1px solid ' + ${teamColor}">
	          <div th:if="${day != null}">
	            <!-- 날짜 -->
	            <div class="fw-bold text-center" th:text="${day.dayOfMonth}"></div>
	
	            <!-- 경기 정보들 -->
	            <div th:each="game : ${day.games}" class="small mt-1">
	              <div th:if="${game != null}">
	                <!-- 스코어 있는 경우 -->
	                <div th:if="${game.homeScore != null and game.awayScore != null}" class="d-flex align-items-center justify-content-center">
	                  <div>
	                    <div class="fw-bold">
	                      <span class="team-name-full" th:text="${game.homeTeamName}"></span>
	                      <span class="team-name-short" th:switch="${game.homeTeamName}">
	                        <span th:case="'두산 베어스'">두산</span>
	                        <span th:case="'KT 위즈'">KT</span>
	                        <span th:case="'삼성 라이온즈'">삼성</span>
	                        <span th:case="'기아 타이거즈'">기아</span>
	                        <span th:case="'한화 이글스'">한화</span>
	                        <span th:case="'롯데 자이언츠'">롯데</span>
	                        <span th:case="'NC 다이노스'">NC</span>
	                        <span th:case="'키움 히어로즈'">키움</span>
	                        <span th:case="'LG 트윈스'">LG</span>
	                        <span th:case="'SSG 랜더스'">SSG</span>
	                        <span th:case="*" th:text="${game.homeTeamName}"></span>
	                      </span>
	                    </div>
	                    <div class="small text-muted" th:text="'(' + ${game.homeScore} + ')'"></div>
	                  </div>
	                  <div class="fw-bold mx-1 text-muted">VS</div>
	                  <div>
	                    <div class="fw-bold">
	                      <span class="team-name-full" th:text="${game.awayTeamName}"></span>
	                      <span class="team-name-short" th:switch="${game.awayTeamName}">
	                        <span th:case="'두산 베어스'">두산</span>
	                        <span th:case="'KT 위즈'">KT</span>
	                        <span th:case="'삼성 라이온즈'">삼성</span>
	                        <span th:case="'기아 타이거즈'">기아</span>
	                        <span th:case="'한화 이글스'">한화</span>
	                        <span th:case="'롯데 자이언츠'">롯데</span>
	                        <span th:case="'NC 다이노스'">NC</span>
	                        <span th:case="'키움 히어로즈'">키움</span>
	                        <span th:case="'LG 트윈스'">LG</span>
	                        <span th:case="'SSG 랜더스'">SSG</span>
	                        <span th:case="*" th:text="${game.awayTeamName}"></span>
	                      </span>
	                    </div>
	                    <div class="small text-muted" th:text="'(' + ${game.awayScore} + ')'"></div>
	                  </div>
	                </div>
	
	                <!-- 스코어 없는 경우 -->
	                <div th:if="${game.homeScore == null or game.awayScore == null}" class="d-flex align-items-center justify-content-center">
	                  <div th:if="${day.date != null and day.date.isBefore(today)}" class="small text-danger text-center">
	                    취소된 경기입니다
	                  </div>
	                  <div th:if="${day.date != null and (day.date.isEqual(today) or day.date.isAfter(today))}" class="d-flex align-items-center">
	                    <div class="fw-bold">
	                      <span class="team-name-full" th:text="${game.homeTeamName}"></span>
	                      <span class="team-name-short" th:switch="${game.homeTeamName}">
	                        <span th:case="'두산 베어스'">두산</span>
	                        <span th:case="'KT 위즈'">KT</span>
	                        <span th:case="'삼성 라이온즈'">삼성</span>
	                        <span th:case="'기아 타이거즈'">기아</span>
	                        <span th:case="'한화 이글스'">한화</span>
	                        <span th:case="'롯데 자이언츠'">롯데</span>
	                        <span th:case="'NC 다이노스'">NC</span>
	                        <span th:case="'키움 히어로즈'">키움</span>
	                        <span th:case="'LG 트윈스'">LG</span>
	                        <span th:case="'SSG 랜더스'">SSG</span>
	                        <span th:case="*" th:text="${game.homeTeamName}"></span>
	                      </span>
	                    </div>
	                    <div class="fw-bold mx-1 text-muted">VS</div>
	                    <div class="fw-bold">
	                      <span class="team-name-full" th:text="${game.awayTeamName}"></span>
	                      <span class="team-name-short" th:switch="${game.awayTeamName}">
	                        <span th:case="'두산 베어스'">두산</span>
	                        <span th:case="'KT 위즈'">KT</span>
	                        <span th:case="'삼성 라이온즈'">삼성</span>
	                        <span th:case="'기아 타이거즈'">기아</span>
	                        <span th:case="'한화 이글스'">한화</span>
	                        <span th:case="'롯데 자이언츠'">롯데</span>
	                        <span th:case="'NC 다이노스'">NC</span>
	                        <span th:case="'키움 히어로즈'">키움</span>
	                        <span th:case="'LG 트윈스'">LG</span>
	                        <span th:case="'SSG 랜더스'">SSG</span>
	                        <span th:case="*" th:text="${game.awayTeamName}"></span>
	                      </span>
	                    </div>
	                  </div>
	                </div>
	
	                <!-- 리뷰 버튼 -->
					<div class="mt-1">
					
					  <a th:if="${day.hasReview and game.homeScore != null and game.awayScore != null}"
						 th:href="@{/review/write-view(scheduleId=${day.scheduleId}, reviewId=${day.reviewId})}"					     
						 class="btn btn-sm btn-outline-primary mt-1 text-white"
					     th:style="'background-color:' + ${teamColor}">
					    리뷰 보기
					  </a>

					  <a th:if="${!day.hasReview 
					             and day.date.isBefore(today)
					             and game.homeScore != null 
					             and game.awayScore != null}" 
					     th:href="@{/review/write-view(scheduleId=${game.scheduleId})}"
					     class="btn btn-sm btn-outline-primary mt-1 text-white"
					     th:style="'background-color:' + ${teamColor}">
					    리뷰 쓰기
					  </a>
					
					  <span th:if="${!day.date.isBefore(today)
					                and (game.homeScore == null or game.awayScore == null)}"
					        class="text-muted small">
					    예정된 경기
					  </span>
					</div>
				    
	              </div>
	            </div>
	          </div>
	        </td>
	      </th:block>
	
	      <!-- 요약 버튼 칸 -->
		<th:block th:with="currentMonthDate=${#lists.isEmpty(#lists.toList(week).?[# != null and #.date.monthValue == month]) ? null : #lists.toList(week).?[# != null and #.date.monthValue == month][0]}">
		  <td class="align-middle text-center"
		      th:style="'width: 140px; background-color: white; border: 1px solid ' + ${teamColor}">
		  
		    <div th:if="${currentMonthDate != null and summaryExistMap != null and summaryExistMap[currentMonthDate.date] != null}">
		      
		      <!-- 요약 있음 -->
		      <a th:if="${summaryExistMap[currentMonthDate.date] == true}"
		         th:href="@{/review/summary-view(startDate=${currentMonthDate.date})}"
		         class="btn btn-sm btn-outline-secondary">
		        요약 보기
		      </a>
		
		      <!-- 요약 없음 + 오늘 이전만 노출 -->
		      <span th:if="${summaryExistMap[currentMonthDate.date] != true and currentMonthDate.date.isBefore(today)}"
		            class="text-muted small">
		        리뷰를 2개 이상<br> 남겨주세요
		      </span>
		      
		    </div>
		  </td>
		</th:block>
	    </tr>
	  </tbody>
	</table>
	</div>
</div>
</th:block>

<th:block layout:fragment="script">
	<script th:inline="javascript">
	  const teamId = /*[[${session.favoriteTeamId}]]*/ 0;
	  
	  document.addEventListener('DOMContentLoaded', function() {
	    if (teamId > 0) {
	      document.body.classList.add('team-bg-' + teamId);
	    }
	  });
	</script>
</th:block>
</html>
