<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/noheadefooter}"
>
  <head>
    <title>게임 플레이 - BaseBall LOCK</title>
    <!-- GSAP 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>

    <style>
      body {
        background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow-x: hidden;
      }

      .game-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      /* 스코어보드 */
      .scoreboard {
        background: rgba(0, 0, 0, 0.8);
        border-radius: 15px;
        padding: 30px;
        margin-bottom: 30px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }

      .score-display {
        font-size: 4rem;
        font-weight: bold;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      }

      .inning-display {
        font-size: 2rem;
        color: #ffd700;
        margin-bottom: 20px;
      }

      /* SVG 야구장 컨테이너 */
      .baseball-field-container {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 30px;
      }

      #baseballField {
        width: 100%;
        max-width: 500px;
        height: 500px;
        margin: 0 auto;
        display: block;
      }

      /* 컨트롤 패널 */
      .control-panel {
        text-align: center;
        margin-top: 20px;
      }

      .btn-game {
        margin: 5px;
        min-width: 150px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* 게임 로그 */
      .game-log {
        background: rgba(0, 0, 0, 0.6);
        border-radius: 10px;
        padding: 20px;
        max-height: 450px;
        overflow-y: auto;
      }

      .log-entry {
        padding: 10px;
        border-left: 3px solid #4CAF50;
        margin-bottom: 10px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 5px;
        animation: slideIn 0.3s ease-out;
      }

      .log-entry.hit {
        border-color: #2196F3;
        background: rgba(33, 150, 243, 0.1);
      }

      .log-entry.homerun {
        border-color: #FFD700;
        background: rgba(255, 215, 0, 0.1);
      }

      .log-entry.out {
        border-color: #f44336;
        background: rgba(244, 67, 54, 0.1);
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* 선수 성적 */
      .player-stats {
        background: rgba(0, 0, 0, 0.6);
        border-radius: 10px;
        padding: 20px;
        margin-top: 20px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* 결과 모달 */
      .result-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }

      .result-content {
        text-align: center;
        padding: 40px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        animation: zoomIn 0.5s ease-out;
      }

      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.5);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* 로딩 */
      .loading {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 9998;
        justify-content: center;
        align-items: center;
      }

      .spinner {
        border: 5px solid rgba(255, 255, 255, 0.3);
        border-top: 5px solid white;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* 애니메이션 설정 토글 */
      .animation-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
      }

      /* 파티클 효과 */
      .particle {
        position: absolute;
        pointer-events: none;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <th:block layout:fragment="contents">
      <!-- 애니메이션 ON/OFF -->
      <div class="animation-toggle">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="animationToggle" checked>
          <label class="form-check-label text-white" for="animationToggle">
            애니메이션 효과
          </label>
        </div>
      </div>

      <div class="game-container">
        <!-- 스코어보드 -->
        <div class="scoreboard">
          <div class="row">
            <div class="col-md-12 text-center">
              <div class="inning-display" id="inningDisplay">1회초</div>
            </div>
          </div>
          <div class="row align-items-center">
            <div class="col-5 text-center">
              <h2 id="myTeamName">나의 팀</h2>
              <div class="score-display text-info" id="myScore">0</div>
            </div>
            <div class="col-2 text-center">
              <h3>VS</h3>
            </div>
            <div class="col-5 text-center">
              <h2 id="opponentName">상대 팀</h2>
              <div class="score-display text-danger" id="opponentScore">0</div>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-12 text-center">
              <span class="badge bg-secondary me-2">아웃: <span id="outCount">0</span></span>
              <span class="badge bg-warning text-dark">타자: <span id="currentBatter">-</span></span>
            </div>
          </div>
        </div>

        <div class="row">
          <!-- SVG 야구장 -->
          <div class="col-md-6">
            <div class="baseball-field-container">
              <svg id="baseballField" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                <!-- 배경 -->
                <defs>
                  <radialGradient id="fieldGradient" cx="50%" cy="50%">
                    <stop offset="0%" style="stop-color:#2c5f2d;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#1a3a1c;stop-opacity:1" />
                  </radialGradient>
                  <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                      <feMergeNode in="coloredBlur"/>
                      <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                  </filter>
                </defs>

                <!-- 외야 -->
                <circle cx="250" cy="250" r="230" fill="url(#fieldGradient)" />

                <!-- 내야 (다이아몬드) -->
                <path d="M 250 370 L 370 250 L 250 130 L 130 250 Z"
                      fill="#d4a373" opacity="0.6" stroke="#8b7355" stroke-width="3"/>

                <!-- 베이스 -->
                <g id="bases">
                  <!-- 홈 (주황색) -->
                  <rect id="baseHome" x="240" y="360" width="20" height="20"
                        fill="#ff6b35" stroke="white" stroke-width="2"
                        transform="rotate(45 250 370)" filter="url(#glow)"/>

                  <!-- 1루 -->
                  <rect id="base1" x="360" y="240" width="20" height="20"
                        fill="white" stroke="#333" stroke-width="2"
                        transform="rotate(45 370 250)" filter="url(#glow)"/>

                  <!-- 2루 -->
                  <rect id="base2" x="240" y="120" width="20" height="20"
                        fill="white" stroke="#333" stroke-width="2"
                        transform="rotate(45 250 130)" filter="url(#glow)"/>

                  <!-- 3루 -->
                  <rect id="base3" x="120" y="240" width="20" height="20"
                        fill="white" stroke="#333" stroke-width="2"
                        transform="rotate(45 130 250)" filter="url(#glow)"/>
                </g>

                <!-- 주자들 -->
                <g id="runners">
                  <circle id="runner1" cx="370" cy="250" r="8" fill="#00ff00" opacity="0" />
                  <circle id="runner2" cx="250" cy="130" r="8" fill="#00ff00" opacity="0" />
                  <circle id="runner3" cx="130" cy="250" r="8" fill="#00ff00" opacity="0" />
                </g>

                <!-- 타자 -->
                <circle id="batter" cx="250" cy="340" r="10" fill="#4CAF50" stroke="white" stroke-width="2"/>

                <!-- 공 -->
                <circle id="ball" cx="250" cy="250" r="6" fill="white" opacity="0" filter="url(#glow)"/>

                <!-- 타격 이펙트 -->
                <circle id="hitEffect" cx="250" cy="340" r="0" fill="yellow" opacity="0"/>
              </svg>
            </div>

            <!-- 컨트롤 패널 -->
            <div class="control-panel">
              <button class="btn btn-success btn-game btn-lg" id="btnStart" onclick="startGame()">
                <i class="bi bi-play-fill"></i> 게임 시작
              </button>
              <button class="btn btn-warning btn-game btn-lg d-none" id="btnPause" onclick="pauseGame()">
                <i class="bi bi-pause-fill"></i> 일시정지
              </button>
              <a th:href="@{/customPlayer}" class="btn btn-outline-light btn-game btn-lg">
                <i class="bi bi-arrow-left"></i> 나가기
              </a>
            </div>
          </div>

          <!-- 게임 로그 -->
          <div class="col-md-6">
            <div class="game-log" id="gameLog">
              <h5 class="mb-3"><i class="bi bi-list-ul"></i> 경기 진행 상황</h5>
              <div class="text-muted">게임을 시작하면 진행 상황이 표시됩니다.</div>
            </div>

            <!-- 선수 성적 -->
            <div class="player-stats">
              <h5><i class="bi bi-graph-up"></i> 선수 성적</h5>
              <div id="playerStatsContainer">
                <div class="text-muted">게임 종료 후 표시됩니다.</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 결과 모달 -->
      <div class="result-modal" id="resultModal">
        <div class="result-content">
          <h1 class="display-3 mb-4" id="resultTitle">승리!</h1>
          <div class="mb-4">
            <h3 id="finalScore"></h3>
          </div>
          <div class="mb-4">
            <i class="bi bi-trophy-fill" style="font-size: 4rem; color: gold;"></i>
            <h4 class="mt-3">MVP: <span id="mvpPlayer">-</span></h4>
          </div>
          <div class="mb-4">
            <h5>획득 경험치: <span id="earnedExp" class="text-warning">+0</span></h5>
          </div>
          <button class="btn btn-light btn-lg" onclick="closeResult()">
            <i class="bi bi-arrow-left"></i> 메인으로
          </button>
        </div>
      </div>

      <!-- 로딩 -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>
    </th:block>

    <th:block layout:fragment="script">
      <script th:inline="javascript">
        let gameInterval;
        let isPaused = false;
        let animationEnabled = true;

        let gameData = {
          inning: 1,
          isTop: true,
          outs: 0,
          myScore: 0,
          opponentScore: 0,
          bases: [false, false, false], // 1루, 2루, 3루
          currentBatter: 0,
          players: [],
          difficulty: 'NORMAL'
        };

        // GSAP 플러그인 등록
        gsap.registerPlugin(MotionPathPlugin);

        // 페이지 로드 시 초기화
        $(document).ready(function() {
          const urlParams = new URLSearchParams(window.location.search);
          gameData.difficulty = urlParams.get('difficulty') || 'NORMAL';

          // 애니메이션 토글
          $('#animationToggle').on('change', function() {
            animationEnabled = $(this).is(':checked');
          });
        });

        // 게임 시작
        function startGame() {
          $('#btnStart').addClass('d-none');
          $('#btnPause').removeClass('d-none');
          $('#loading').show();

          $.ajax({
            url: '/api/custom-players/play',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
              userId: 1,
              gameMode: 'HITTER',
              difficulty: gameData.difficulty
            }),
            success: function(response) {
              $('#loading').hide();
              if (response.success) {
                playGameAnimation(response.data);
              } else {
                alert('게임 시작 실패: ' + response.message);
                resetButtons();
              }
            },
            error: function() {
              $('#loading').hide();
              alert('게임 시작 중 오류가 발생했습니다.');
              resetButtons();
            }
          });
        }

        // 게임 일시정지
        function pauseGame() {
          isPaused = !isPaused;
          if (isPaused) {
            clearInterval(gameInterval);
            $('#btnPause').html('<i class="bi bi-play-fill"></i> 재개');
          } else {
            $('#btnPause').html('<i class="bi bi-pause-fill"></i> 일시정지');
          }
        }

        // 게임 애니메이션 재생
        function playGameAnimation(result) {
          addLog('⚾ 경기를 시작합니다!');
          addLog(`난이도: ${gameData.difficulty}`);

          let currentInning = 1;
          let eventIndex = 0;

          gameInterval = setInterval(() => {
            if (isPaused) return;

            if (currentInning > 9) {
              clearInterval(gameInterval);
              finishGame(result);
              return;
            }

            simulateAtBat();
            eventIndex++;

            if (gameData.outs >= 3) {
              clearBases();
              gameData.outs = 0;
              gameData.bases = [false, false, false];

              if (gameData.isTop) {
                addLog('--- 공격 종료 ---');
                gameData.isTop = false;
                updateInning();
              } else {
                gameData.isTop = true;
                currentInning++;
                if (currentInning <= 9) {
                  gameData.inning = currentInning;
                  updateInning();
                  addLog(`=== ${currentInning}회 시작 ===`);
                }
              }
            }
          }, 1500);
        }

        // 타격 시뮬레이션
        function simulateAtBat() {
          const rand = Math.random();

          if (rand < 0.15) {
            // 홈런 (15%)
            animateHomeRun();
            if (gameData.isTop) {
              gameData.myScore += 1 + countRunnersOnBase();
            } else {
              gameData.opponentScore += 1 + countRunnersOnBase();
            }
            gameData.bases = [false, false, false];
            addLog('💥 홈런! 모든 주자가 홈으로!', 'homerun');
          } else if (rand < 0.40) {
            // 안타 (25%)
            animateHit();
            advanceRunners(1);
            addLog('⚡ 안타!', 'hit');
          } else if (rand < 0.50) {
            // 2루타 (10%)
            animateDouble();
            advanceRunners(2);
            addLog('🔥 2루타!', 'hit');
          } else {
            // 아웃 (50%)
            animateOut();
            gameData.outs++;
            addLog('❌ 아웃!', 'out');
          }

          updateScoreboard();
        }

        // 홈런 애니메이션
        function animateHomeRun() {
          if (!animationEnabled) return;

          const ball = document.getElementById('ball');
          const hitEffect = document.getElementById('hitEffect');

          // 타격 이펙트
          gsap.timeline()
            .set(hitEffect, { attr: { r: 0 }, opacity: 1 })
            .to(hitEffect, {
              attr: { r: 50 },
              opacity: 0,
              duration: 0.5,
              ease: 'power2.out'
            });

          // 공 궤적 (포물선)
          gsap.timeline()
            .set(ball, { opacity: 1, attr: { cx: 250, cy: 340 } })
            .to(ball, {
              motionPath: {
                path: [
                  { x: 250, y: 340 },
                  { x: 300, y: 200 },
                  { x: 400, y: 100 }
                ],
                curviness: 1.5
              },
              duration: 1.5,
              ease: 'power2.out'
            })
            .to(ball, { opacity: 0, duration: 0.2 });

          // 파티클 효과
          createParticles(250, 340, '#FFD700', 12);
        }

        // 안타 애니메이션
        function animateHit() {
          if (!animationEnabled) return;

          const ball = document.getElementById('ball');
          const hitEffect = document.getElementById('hitEffect');

          // 타격 이펙트
          gsap.timeline()
            .set(hitEffect, { attr: { r: 0 }, opacity: 1 })
            .to(hitEffect, {
              attr: { r: 30 },
              opacity: 0,
              duration: 0.3
            });

          // 공이 내야로
          gsap.timeline()
            .set(ball, { opacity: 1, attr: { cx: 250, cy: 340 } })
            .to(ball, {
              attr: { cx: 370, cy: 250 },
              duration: 0.8,
              ease: 'power2.out'
            })
            .to(ball, { opacity: 0, duration: 0.2 });

          createParticles(250, 340, '#2196F3', 6);
        }

        // 2루타 애니메이션
        function animateDouble() {
          if (!animationEnabled) return;

          const ball = document.getElementById('ball');
          const hitEffect = document.getElementById('hitEffect');

          gsap.timeline()
            .set(hitEffect, { attr: { r: 0 }, opacity: 1 })
            .to(hitEffect, {
              attr: { r: 35 },
              opacity: 0,
              duration: 0.4
            });

          gsap.timeline()
            .set(ball, { opacity: 1, attr: { cx: 250, cy: 340 } })
            .to(ball, {
              motionPath: {
                path: [
                  { x: 250, y: 340 },
                  { x: 320, y: 200 },
                  { x: 250, y: 130 }
                ]
              },
              duration: 1,
              ease: 'power2.out'
            })
            .to(ball, { opacity: 0, duration: 0.2 });

          createParticles(250, 340, '#4CAF50', 8);
        }

        // 아웃 애니메이션
        function animateOut() {
          if (!animationEnabled) return;

          const batter = document.getElementById('batter');

          gsap.timeline()
            .to(batter, {
              opacity: 0.3,
              duration: 0.3,
              yoyo: true,
              repeat: 1
            });
        }

        // 주자 진루
        function advanceRunners(bases) {
          let newBases = [false, false, false];

          // 기존 주자들 이동
          for (let i = 2; i >= 0; i--) {
            if (gameData.bases[i]) {
              const newPos = i + bases;
              if (newPos >= 3) {
                // 득점
                if (gameData.isTop) {
                  gameData.myScore++;
                } else {
                  gameData.opponentScore++;
                }
                animateRunnerScore(i);
              } else {
                newBases[newPos] = true;
                animateRunnerMove(i, newPos);
              }
            }
          }

          // 타자 출루
          if (bases <= 3) {
            newBases[bases - 1] = true;
          }

          gameData.bases = newBases;
          updateRunners();
        }

        // 주자 이동 애니메이션
        function animateRunnerMove(from, to) {
          if (!animationEnabled) return;

          const positions = [
            { x: 370, y: 250 }, // 1루
            { x: 250, y: 130 }, // 2루
            { x: 130, y: 250 }  // 3루
          ];

          const runner = document.getElementById(`runner${from + 1}`);

          gsap.to(runner, {
            attr: { cx: positions[to].x, cy: positions[to].y },
            duration: 0.8,
            ease: 'power2.inOut'
          });
        }

        // 주자 득점 애니메이션
        function animateRunnerScore(from) {
          if (!animationEnabled) return;

          const runner = document.getElementById(`runner${from + 1}`);

          gsap.timeline()
            .to(runner, {
              attr: { cx: 250, cy: 370 },
              duration: 0.8,
              ease: 'power2.in'
            })
            .to(runner, { opacity: 0, duration: 0.3 });

          // 득점 파티클
          setTimeout(() => createParticles(250, 370, '#00ff00', 8), 800);
        }

        // 주자 표시 업데이트
        function updateRunners() {
          for (let i = 0; i < 3; i++) {
            const runner = document.getElementById(`runner${i + 1}`);
            if (animationEnabled) {
              gsap.to(runner, {
                opacity: gameData.bases[i] ? 1 : 0,
                duration: 0.3
              });
            } else {
              runner.setAttribute('opacity', gameData.bases[i] ? 1 : 0);
            }
          }
        }

        // 베이스 초기화
        function clearBases() {
          for (let i = 1; i <= 3; i++) {
            const runner = document.getElementById(`runner${i}`);
            if (animationEnabled) {
              gsap.to(runner, { opacity: 0, duration: 0.3 });
            } else {
              runner.setAttribute('opacity', 0);
            }
          }
        }

        // 파티클 생성
        function createParticles(x, y, color, count) {
          if (!animationEnabled) return;

          const svg = document.getElementById('baseballField');

          for (let i = 0; i < count; i++) {
            const particle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            particle.setAttribute('cx', x);
            particle.setAttribute('cy', y);
            particle.setAttribute('r', 3);
            particle.setAttribute('fill', color);
            particle.setAttribute('opacity', 0.8);

            svg.appendChild(particle);

            const angle = (Math.PI * 2 * i) / count;
            const distance = 50 + Math.random() * 30;

            gsap.to(particle, {
              attr: {
                cx: x + Math.cos(angle) * distance,
                cy: y + Math.sin(angle) * distance
              },
              opacity: 0,
              duration: 0.8,
              ease: 'power2.out',
              onComplete: () => particle.remove()
            });
          }
        }

        // 주자 수 세기
        function countRunnersOnBase() {
          return gameData.bases.filter(b => b).length;
        }

        // 스코어보드 업데이트
        function updateScoreboard() {
          $('#myScore').text(gameData.myScore);
          $('#opponentScore').text(gameData.opponentScore);
          $('#outCount').text(gameData.outs);
        }

        // 이닝 표시 업데이트
        function updateInning() {
          const topBottom = gameData.isTop ? '초' : '말';
          $('#inningDisplay').text(`${gameData.inning}회${topBottom}`);
        }

        // 로그 추가
        function addLog(message, type = '') {
          const logEntry = $(`<div class="log-entry ${type}">${message}</div>`);
          const firstChild = $('#gameLog').children().first();

          if (firstChild.hasClass('text-muted')) {
            firstChild.remove();
          }

          $('#gameLog').prepend(logEntry);

          // 최대 50개 로그만 유지
          const logs = $('#gameLog .log-entry');
          if (logs.length > 50) {
            logs.last().remove();
          }
        }

        // 게임 종료
        function finishGame(result) {
          addLog('🏁 경기가 종료되었습니다!');

          const isWin = gameData.myScore > gameData.opponentScore;

          $('#resultTitle').text(isWin ? '승리!' : '패배');
          $('#finalScore').text(`${gameData.myScore} : ${gameData.opponentScore}`);
          $('#mvpPlayer').text(result.mvpPlayer || '알 수 없음');
          $('#earnedExp').text(`+${isWin ? 100 : 50}`);

          // MVP 카드 애니메이션
          setTimeout(() => {
            $('#resultModal').css('display', 'flex');
            if (animationEnabled) {
              gsap.from('.result-content', {
                scale: 0,
                rotation: 360,
                duration: 0.8,
                ease: 'back.out(1.7)'
              });
            }
          }, 1000);

          resetButtons();
        }

        // 결과 닫기
        function closeResult() {
          $('#resultModal').fadeOut();
          window.location.href = '/customPlayer';
        }

        // 버튼 리셋
        function resetButtons() {
          $('#btnStart').removeClass('d-none');
          $('#btnPause').addClass('d-none');
        }
      </script>
    </th:block>
  </body>
</html>
