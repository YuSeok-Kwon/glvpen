<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/default}"
>
  <head>
    <title>선수 훈련 - BaseBall LOCK</title>
    <style>
      .training-container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .player-selector {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 15px;
        padding: 25px;
        color: white;
        margin-bottom: 30px;
      }

      .player-card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        transition: all 0.3s ease;
      }

      .player-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(0,0,0,0.2);
      }

      .stat-bar {
        height: 25px;
        background: #e9ecef;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        margin: 8px 0;
      }

      .stat-fill {
        height: 100%;
        background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
        transition: width 0.5s ease;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 10px;
        color: white;
        font-weight: bold;
        font-size: 12px;
      }

      .stat-label {
        font-weight: 600;
        color: #495057;
        margin-bottom: 5px;
        display: flex;
        justify-content: space-between;
      }

      .training-card {
        border-radius: 15px;
        border: none;
        transition: all 0.3s ease;
        cursor: pointer;
        height: 100%;
      }

      .training-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      }

      .training-card.selected {
        border: 3px solid #667eea;
        box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
      }

      .training-card .card-body {
        padding: 30px;
      }

      .training-icon {
        font-size: 48px;
        margin-bottom: 15px;
      }

      .intensity-selector {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 20px;
        margin: 20px 0;
      }

      .intensity-btn {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 3px solid #dee2e6;
        background: white;
        font-size: 24px;
        font-weight: bold;
        transition: all 0.3s ease;
        margin: 0 10px;
      }

      .intensity-btn:hover {
        transform: scale(1.1);
      }

      .intensity-btn.selected {
        border-color: #667eea;
        background: #667eea;
        color: white;
      }

      .training-points-display {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        color: white;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .training-btn {
        width: 100%;
        padding: 18px;
        font-size: 20px;
        font-weight: bold;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        transition: all 0.3s ease;
      }

      .training-btn:hover:not(:disabled) {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
      }

      .training-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .result-modal .modal-content {
        border-radius: 20px;
        border: none;
      }

      .result-success {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        color: white;
        padding: 40px;
        text-align: center;
        border-radius: 20px 20px 0 0;
      }

      .result-failure {
        background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
        color: white;
        padding: 40px;
        text-align: center;
        border-radius: 20px 20px 0 0;
      }

      .stat-change {
        display: inline-block;
        margin: 0 10px;
        padding: 5px 15px;
        border-radius: 20px;
        font-weight: bold;
      }

      .stat-increase {
        background: #d4edda;
        color: #155724;
      }

      .stat-decrease {
        background: #f8d7da;
        color: #721c24;
      }

      .stat-unchanged {
        background: #e2e3e5;
        color: #383d41;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      .training-animation {
        animation: pulse 1s ease-in-out;
      }
    </style>
  </head>
  <body>
    <th:block layout:fragment="contents">
      <div class="container training-container py-5">
        <h1 class="display-4 mb-4">
          <i class="bi bi-trophy-fill"></i> 선수 훈련 시스템
        </h1>

        <!-- 선수 선택 -->
        <div class="player-selector">
          <h3 class="mb-3">
            <i class="bi bi-person-circle"></i> 훈련할 선수 선택
          </h3>
          <select id="playerSelect" class="form-select form-select-lg">
            <option value="">선수를 선택하세요</option>
          </select>
        </div>

        <div id="trainingArea" style="display: none;">
          <!-- 현재 선수 정보 -->
          <div class="player-card">
            <div class="row">
              <div class="col-md-6">
                <h4 id="selectedPlayerName" class="mb-3"></h4>
                <div class="row">
                  <div class="col-6">
                    <strong>레벨:</strong> <span id="playerLevel">1</span>
                  </div>
                  <div class="col-6">
                    <strong>경험치:</strong> <span id="playerExp">0</span> / <span id="playerExpMax">100</span>
                  </div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="training-points-display">
                  <div><i class="bi bi-star-fill"></i> 훈련 포인트</div>
                  <div id="trainingPoints" style="font-size: 36px;">0</div>
                </div>
              </div>
            </div>

            <hr class="my-4">

            <h5 class="mb-3">현재 능력치</h5>
            <div id="statsDisplay">
              <!-- 능력치 바가 여기에 표시됩니다 -->
            </div>
          </div>

          <!-- 훈련 타입 선택 -->
          <div class="row mb-4">
            <div class="col-md-3">
              <div class="card training-card" data-training-type="BATTING">
                <div class="card-body text-center">
                  <div class="training-icon">⚾</div>
                  <h5 class="card-title">타격 훈련</h5>
                  <p class="card-text text-muted">
                    파워 +<br>컨택트 +
                  </p>
                </div>
              </div>
            </div>
            <div class="col-md-3">
              <div class="card training-card" data-training-type="RUNNING">
                <div class="card-body text-center">
                  <div class="training-icon">🏃</div>
                  <h5 class="card-title">주루 훈련</h5>
                  <p class="card-text text-muted">
                    스피드 ++
                  </p>
                </div>
              </div>
            </div>
            <div class="col-md-3">
              <div class="card training-card" data-training-type="FIELDING">
                <div class="card-body text-center">
                  <div class="training-icon">🧤</div>
                  <h5 class="card-title">수비 훈련</h5>
                  <p class="card-text text-muted">
                    수비력 +<br>어깨 +
                  </p>
                </div>
              </div>
            </div>
            <div class="col-md-3">
              <div class="card training-card" data-training-type="STAMINA">
                <div class="card-body text-center">
                  <div class="training-icon">💪</div>
                  <h5 class="card-title">체력 훈련</h5>
                  <p class="card-text text-muted">
                    모든 능력치 소폭 +
                  </p>
                </div>
              </div>
            </div>
          </div>

          <!-- 훈련 강도 선택 -->
          <div class="intensity-selector">
            <h5 class="text-center mb-3">훈련 강도 선택</h5>
            <div class="d-flex justify-content-center">
              <button class="intensity-btn" data-intensity="1">
                1
                <div style="font-size: 12px; margin-top: 5px;">낮음</div>
              </button>
              <button class="intensity-btn" data-intensity="2">
                2
                <div style="font-size: 12px; margin-top: 5px;">보통</div>
              </button>
              <button class="intensity-btn" data-intensity="3">
                3
                <div style="font-size: 12px; margin-top: 5px;">높음</div>
              </button>
            </div>
            <p class="text-center mt-3 text-muted">
              <small>강도가 높을수록 성공 시 더 많이 성장하지만, 실패 확률도 높아집니다.</small>
            </p>
          </div>

          <!-- 훈련 시작 버튼 -->
          <button id="startTrainingBtn" class="training-btn" disabled>
            <i class="bi bi-play-circle-fill"></i> 훈련 시작
          </button>
        </div>

        <a th:href="@{/customPlayer}" class="btn btn-secondary mt-4">
          <i class="bi bi-arrow-left"></i> 돌아가기
        </a>
      </div>

      <!-- 훈련 결과 모달 -->
      <div class="modal fade result-modal" id="resultModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div id="resultHeader"></div>
            <div class="modal-body" style="padding: 30px;">
              <div id="resultMessage" class="text-center mb-4" style="font-size: 18px;"></div>
              <div id="statChanges"></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                확인
              </button>
            </div>
          </div>
        </div>
      </div>
    </th:block>

    <th:block layout:fragment="scripts">
      <script>
        let selectedPlayer = null;
        let selectedTrainingType = null;
        let selectedIntensity = 1;

        $(document).ready(function() {
          loadTrainablePlayers();

          // 선수 선택 이벤트
          $('#playerSelect').on('change', function() {
            const playerId = $(this).val();
            if (playerId) {
              loadPlayerDetails(playerId);
            } else {
              $('#trainingArea').hide();
            }
          });

          // 훈련 타입 선택 이벤트
          $('.training-card').on('click', function() {
            $('.training-card').removeClass('selected');
            $(this).addClass('selected');
            selectedTrainingType = $(this).data('training-type');
            updateTrainingButton();
          });

          // 훈련 강도 선택 이벤트
          $('.intensity-btn').on('click', function() {
            $('.intensity-btn').removeClass('selected');
            $(this).addClass('selected');
            selectedIntensity = $(this).data('intensity');
            updateTrainingButton();
          });

          // 훈련 시작 버튼
          $('#startTrainingBtn').on('click', function() {
            startTraining();
          });

          // 기본 강도 선택
          $('.intensity-btn[data-intensity="1"]').addClass('selected');
        });

        // 훈련 가능한 선수 목록 로드
        function loadTrainablePlayers() {
          $.ajax({
            url: '/api/custom-players/trainable',
            method: 'GET',
            data: { userId: 1 }, // TODO: 세션에서 userId 가져오기
            success: function(response) {
              if (response.success && response.players) {
                const select = $('#playerSelect');
                select.empty();
                select.append('<option value="">선수를 선택하세요</option>');

                response.players.forEach(function(player) {
                  select.append(
                    `<option value="${player.id}">
                      ${player.playerName} (Lv.${player.level}) - 훈련 포인트: ${player.trainingPoints || 0}
                    </option>`
                  );
                });
              }
            },
            error: function(xhr) {
              alert('선수 목록을 불러오는데 실패했습니다.');
            }
          });
        }

        // 선수 상세 정보 로드
        function loadPlayerDetails(playerId) {
          $.ajax({
            url: `/api/custom-players/${playerId}`,
            method: 'GET',
            success: function(response) {
              if (response.success && response.data) {
                selectedPlayer = response.data;
                displayPlayerDetails(selectedPlayer);
                $('#trainingArea').fadeIn();
              }
            },
            error: function(xhr) {
              alert('선수 정보를 불러오는데 실패했습니다.');
            }
          });
        }

        // 선수 정보 표시
        function displayPlayerDetails(player) {
          $('#selectedPlayerName').text(player.playerName);
          $('#playerLevel').text(player.level);
          $('#playerExp').text(player.experience);
          $('#playerExpMax').text(player.level * 100);
          $('#trainingPoints').text(player.trainingPoints || 0);

          // 능력치 바 표시
          const stats = [
            { name: '파워', value: player.power, id: 'power' },
            { name: '컨택트', value: player.contact, id: 'contact' },
            { name: '스피드', value: player.speed, id: 'speed' },
            { name: '수비력', value: player.fielding, id: 'fielding' },
            { name: '어깨', value: player.arm, id: 'arm' }
          ];

          let statsHtml = '';
          stats.forEach(function(stat) {
            const percentage = (stat.value / 99) * 100;
            statsHtml += `
              <div class="mb-3">
                <div class="stat-label">
                  <span>${stat.name}</span>
                  <span id="stat-${stat.id}">${stat.value}</span>
                </div>
                <div class="stat-bar">
                  <div class="stat-fill" id="stat-bar-${stat.id}" style="width: ${percentage}%">
                    ${stat.value}
                  </div>
                </div>
              </div>
            `;
          });

          $('#statsDisplay').html(statsHtml);
        }

        // 훈련 버튼 활성화/비활성화
        function updateTrainingButton() {
          const canTrain = selectedPlayer &&
                          selectedTrainingType &&
                          selectedIntensity &&
                          (selectedPlayer.trainingPoints || 0) >= selectedIntensity;

          $('#startTrainingBtn').prop('disabled', !canTrain);

          if (!canTrain && selectedPlayer && (selectedPlayer.trainingPoints || 0) < selectedIntensity) {
            $('#startTrainingBtn').text('훈련 포인트 부족');
          } else {
            $('#startTrainingBtn').html('<i class="bi bi-play-circle-fill"></i> 훈련 시작');
          }
        }

        // 훈련 시작
        function startTraining() {
          if (!selectedPlayer || !selectedTrainingType) {
            return;
          }

          const trainingData = {
            playerId: selectedPlayer.id,
            trainingType: selectedTrainingType,
            intensity: selectedIntensity
          };

          $('#startTrainingBtn').prop('disabled', true).text('훈련 중...');

          $.ajax({
            url: '/api/custom-players/training',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(trainingData),
            success: function(response) {
              if (response.success) {
                showTrainingResult(response.data);
                // 선수 정보 새로고침
                setTimeout(function() {
                  loadPlayerDetails(selectedPlayer.id);
                  loadTrainablePlayers();
                }, 500);
              } else {
                alert(response.message || '훈련에 실패했습니다.');
              }
            },
            error: function(xhr) {
              const error = xhr.responseJSON;
              alert(error?.message || '훈련 중 오류가 발생했습니다.');
            },
            complete: function() {
              $('#startTrainingBtn').prop('disabled', false);
              updateTrainingButton();
            }
          });
        }

        // 훈련 결과 표시
        function showTrainingResult(result) {
          const headerClass = result.success ? 'result-success' : 'result-failure';
          const headerIcon = result.success ? '🎉' : '😓';
          const headerText = result.success ? '훈련 성공!' : '훈련 실패';

          $('#resultHeader').attr('class', headerClass).html(`
            <h3>${headerIcon} ${headerText}</h3>
          `);

          $('#resultMessage').text(result.message);

          // 능력치 변화 표시
          let changesHtml = '<h5 class="text-center mb-3">능력치 변화</h5>';

          const statNames = {
            power: '파워',
            contact: '컨택트',
            speed: '스피드',
            fielding: '수비력',
            arm: '어깨'
          };

          Object.keys(statNames).forEach(function(key) {
            const before = result.statsBefore[key];
            const after = result.statsAfter[key];
            const change = after - before;

            let changeClass = 'stat-unchanged';
            let changeText = '±0';

            if (change > 0) {
              changeClass = 'stat-increase';
              changeText = `+${change}`;
            } else if (change < 0) {
              changeClass = 'stat-decrease';
              changeText = `${change}`;
            }

            changesHtml += `
              <div class="d-flex justify-content-between align-items-center mb-2">
                <strong>${statNames[key]}:</strong>
                <div>
                  <span>${before}</span>
                  <i class="bi bi-arrow-right mx-2"></i>
                  <span>${after}</span>
                  <span class="stat-change ${changeClass}">${changeText}</span>
                </div>
              </div>
            `;
          });

          changesHtml += `
            <hr class="my-3">
            <div class="text-center">
              <strong>남은 훈련 포인트:</strong> ${result.remainingTrainingPoints}
            </div>
          `;

          $('#statChanges').html(changesHtml);

          const modal = new bootstrap.Modal(document.getElementById('resultModal'));
          modal.show();

          // 모달이 닫힐 때 훈련 타입 선택 초기화
          $('#resultModal').on('hidden.bs.modal', function() {
            $('.training-card').removeClass('selected');
            selectedTrainingType = null;
            updateTrainingButton();
          });
        }
      </script>
    </th:block>
  </body>
</html>
