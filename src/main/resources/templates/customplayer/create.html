<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/default}"
>
  <head>
    <title>커스텀 선수 생성 - BaseBall LOCK</title>
  </head>
  <body>
    <th:block layout:fragment="contents">
      <div class="container py-5">
        <div class="row mb-4">
          <div class="col-12">
            <h1 class="display-4 mb-3">
              <i class="bi bi-plus-circle"></i> 새 선수 만들기
            </h1>
            <p class="lead text-muted">
              당신만의 야구 선수를 만들어보세요
            </p>
          </div>
        </div>

        <form id="createPlayerForm">
          <!-- 기본 정보 -->
          <div class="card mb-4">
            <div class="card-header bg-primary text-white">
              <h5 class="mb-0">
                <i class="bi bi-person"></i> 기본 정보
              </h5>
            </div>
            <div class="card-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="playerName" class="form-label">
                    선수 이름 <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="playerName"
                    name="playerName"
                    required
                    maxlength="50"
                    placeholder="예: 김야구"
                  />
                </div>

                <div class="col-md-3">
                  <label for="age" class="form-label">
                    나이 <span class="text-danger">*</span>
                  </label>
                  <input
                    type="number"
                    class="form-control"
                    id="age"
                    name="age"
                    required
                    min="18"
                    max="45"
                    value="25"
                  />
                </div>

                <div class="col-md-3">
                  <label for="position" class="form-label">
                    포지션 <span class="text-danger">*</span>
                  </label>
                  <select class="form-select" id="position" name="position" required>
                    <option value="">선택</option>
                    <option value="1B">1루수 (1B)</option>
                    <option value="2B">2루수 (2B)</option>
                    <option value="3B">3루수 (3B)</option>
                    <option value="SS">유격수 (SS)</option>
                    <option value="C">포수 (C)</option>
                    <option value="OF">외야수 (OF)</option>
                    <option value="DH">지명타자 (DH)</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- 능력치 배분 -->
          <div class="card mb-4">
            <div class="card-header bg-success text-white">
              <h5 class="mb-0">
                <i class="bi bi-bar-chart"></i> 능력치 배분
              </h5>
            </div>
            <div class="card-body">
              <div class="alert alert-info">
                <i class="bi bi-info-circle"></i>
                총 <strong>200 포인트</strong>를 배분하세요 (각 능력치 최대 100)
                <div class="mt-2">
                  남은 포인트: <strong id="remainingPoints" class="fs-4">0</strong>
                </div>
              </div>

              <div class="row g-4">
                <!-- 파워 -->
                <div class="col-md-6">
                  <label for="battingPower" class="form-label">
                    <i class="bi bi-lightning-fill text-danger"></i> 파워 (장타력)
                  </label>
                  <div class="d-flex align-items-center gap-3">
                    <input
                      type="range"
                      class="form-range"
                      id="battingPower"
                      name="battingPower"
                      min="0"
                      max="100"
                      value="50"
                      oninput="updateStat('battingPower')"
                    />
                    <span class="badge bg-danger fs-5" id="battingPowerValue" style="min-width: 50px;">50</span>
                  </div>
                  <div class="progress mt-2" style="height: 25px;">
                    <div
                      class="progress-bar bg-danger"
                      id="battingPowerBar"
                      style="width: 50%"
                    >
                      파워 50
                    </div>
                  </div>
                </div>

                <!-- 정확도 -->
                <div class="col-md-6">
                  <label for="contactAbility" class="form-label">
                    <i class="bi bi-bullseye text-primary"></i> 정확도 (안타)
                  </label>
                  <div class="d-flex align-items-center gap-3">
                    <input
                      type="range"
                      class="form-range"
                      id="contactAbility"
                      name="contactAbility"
                      min="0"
                      max="100"
                      value="50"
                      oninput="updateStat('contactAbility')"
                    />
                    <span class="badge bg-primary fs-5" id="contactAbilityValue" style="min-width: 50px;">50</span>
                  </div>
                  <div class="progress mt-2" style="height: 25px;">
                    <div
                      class="progress-bar bg-primary"
                      id="contactAbilityBar"
                      style="width: 50%"
                    >
                      정확도 50
                    </div>
                  </div>
                </div>

                <!-- 스피드 -->
                <div class="col-md-6">
                  <label for="speed" class="form-label">
                    <i class="bi bi-lightning text-success"></i> 스피드 (주루)
                  </label>
                  <div class="d-flex align-items-center gap-3">
                    <input
                      type="range"
                      class="form-range"
                      id="speed"
                      name="speed"
                      min="0"
                      max="100"
                      value="50"
                      oninput="updateStat('speed')"
                    />
                    <span class="badge bg-success fs-5" id="speedValue" style="min-width: 50px;">50</span>
                  </div>
                  <div class="progress mt-2" style="height: 25px;">
                    <div
                      class="progress-bar bg-success"
                      id="speedBar"
                      style="width: 50%"
                    >
                      스피드 50
                    </div>
                  </div>
                </div>

                <!-- 수비 -->
                <div class="col-md-6">
                  <label for="fielding" class="form-label">
                    <i class="bi bi-shield-fill text-warning"></i> 수비력
                  </label>
                  <div class="d-flex align-items-center gap-3">
                    <input
                      type="range"
                      class="form-range"
                      id="fielding"
                      name="fielding"
                      min="0"
                      max="100"
                      value="50"
                      oninput="updateStat('fielding')"
                    />
                    <span class="badge bg-warning text-dark fs-5" id="fieldingValue" style="min-width: 50px;">50</span>
                  </div>
                  <div class="progress mt-2" style="height: 25px;">
                    <div
                      class="progress-bar bg-warning"
                      id="fieldingBar"
                      style="width: 50%"
                    >
                      수비 50
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 제출 버튼 -->
          <div class="row">
            <div class="col-12">
              <div class="d-flex gap-2 justify-content-end">
                <button
                  type="button"
                  class="btn btn-secondary btn-lg"
                  onclick="history.back()"
                >
                  <i class="bi bi-x-circle"></i> 취소
                </button>
                <button type="submit" class="btn btn-primary btn-lg" id="btnSubmit">
                  <i class="bi bi-check-circle"></i> 선수 생성
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </th:block>

    <th:block layout:fragment="script">
      <script th:inline="javascript">
        const TOTAL_POINTS = 200;
        let currentStats = {
          battingPower: 50,
          contactAbility: 50,
          speed: 50,
          fielding: 50,
        };

        // 페이지 로드 시 초기화
        $(document).ready(function () {
          updateRemainingPoints();
        });

        // 능력치 업데이트
        function updateStat(statName) {
          const value = parseInt($(`#${statName}`).val());
          currentStats[statName] = value;

          // 값 표시 업데이트
          $(`#${statName}Value`).text(value);

          // 프로그레스 바 업데이트
          const barId = `#${statName}Bar`;
          $(barId).css('width', `${value}%`);
          $(barId).text(`${getStatLabel(statName)} ${value}`);

          // 남은 포인트 업데이트
          updateRemainingPoints();
        }

        // 능력치 라벨 가져오기
        function getStatLabel(statName) {
          const labels = {
            battingPower: '파워',
            contactAbility: '정확도',
            speed: '스피드',
            fielding: '수비',
          };
          return labels[statName] || statName;
        }

        // 남은 포인트 계산 및 표시
        function updateRemainingPoints() {
          const totalUsed =
            currentStats.battingPower +
            currentStats.contactAbility +
            currentStats.speed +
            currentStats.fielding;

          const remaining = TOTAL_POINTS - totalUsed;

          $('#remainingPoints').text(remaining);

          // 초과 시 경고 표시
          if (remaining < 0) {
            $('#remainingPoints').removeClass('text-success').addClass('text-danger');
            $('#btnSubmit').prop('disabled', true);
          } else if (remaining === 0) {
            $('#remainingPoints').removeClass('text-danger').addClass('text-success');
            $('#btnSubmit').prop('disabled', false);
          } else {
            $('#remainingPoints').removeClass('text-danger text-success');
            $('#btnSubmit').prop('disabled', false);
          }
        }

        // 폼 제출
        $('#createPlayerForm').on('submit', function (e) {
          e.preventDefault();

          // 검증
          const totalUsed =
            currentStats.battingPower +
            currentStats.contactAbility +
            currentStats.speed +
            currentStats.fielding;

          if (totalUsed > TOTAL_POINTS) {
            alert('능력치 총합이 200을 초과했습니다.');
            return;
          }

          if (!$('#playerName').val().trim()) {
            alert('선수 이름을 입력해주세요.');
            return;
          }

          if (!$('#position').val()) {
            alert('포지션을 선택해주세요.');
            return;
          }

          // 데이터 준비
          const playerData = {
            playerName: $('#playerName').val().trim(),
            age: parseInt($('#age').val()),
            position: $('#position').val(),
            battingPower: currentStats.battingPower,
            contactAbility: currentStats.contactAbility,
            speed: currentStats.speed,
            fielding: currentStats.fielding,
            throwingPower: 50, // 기본값
          };

          // 버튼 비활성화
          $('#btnSubmit').prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> 생성 중...');

          // API 호출
          $.ajax({
            url: '/api/custom-players',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(playerData),
            success: function (response) {
              if (response.success) {
                alert(`"${playerData.playerName}" 선수가 생성되었습니다!`);
                window.location.href = '/customPlayer';
              }
            },
            error: function (xhr) {
              $('#btnSubmit').prop('disabled', false).html('<i class="bi bi-check-circle"></i> 선수 생성');

              if (xhr.status === 401) {
                alert('로그인이 필요합니다.');
                window.location.href = '/user/login-view';
              } else if (xhr.status === 400) {
                const response = xhr.responseJSON;
                alert(response.message || '잘못된 입력값입니다.');
              } else {
                alert('선수 생성에 실패했습니다.');
              }
            },
          });
        });
      </script>
    </th:block>
  </body>
</html>
