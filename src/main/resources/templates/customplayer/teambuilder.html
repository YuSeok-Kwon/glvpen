<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/default}"
>
  <head>
    <title>팀 구성 - BaseBall LOCK</title>
  </head>
  <body>
    <th:block layout:fragment="contents">
      <div class="container py-5">
        <h1 class="display-4 mb-4">
          <i class="bi bi-people"></i> 팀 구성하기
        </h1>

        <div class="alert alert-success">
          <i class="bi bi-lightbulb"></i> 커스텀 선수들로 드림팀을 구성하세요! (준비 중)
        </div>

        <div class="row">
          <div class="col-md-8">
            <div class="card">
              <div class="card-header bg-primary text-white">
                <h5 class="mb-0">라인업 설정</h5>
              </div>
              <div class="card-body">
                <p class="text-muted">9명의 선수로 라인업을 구성하세요.</p>
                <!-- 라인업 UI (준비 중) -->
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card">
              <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">보유 선수</h5>
              </div>
              <div class="card-body">
                <p class="text-muted">보유 선수 목록</p>
              </div>
            </div>
          </div>
        </div>

        <a th:href="@{/customPlayer}" class="btn btn-secondary mt-4">
          <i class="bi bi-arrow-left"></i> 돌아가기
        </a>
      </div>
    </th:block>
  </body>
</html>
