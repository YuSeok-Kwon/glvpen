<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/default}"
>
  <head>
    <title>팀 빌더 - BaseBall LOCK</title>
    <style>
      .team-builder-container {
        max-width: 1600px;
        margin: 0 auto;
      }

      .baseball-field {
        width: 100%;
        max-width: 600px;
        height: 600px;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        border-radius: 15px;
        position: relative;
        margin: 0 auto;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      }

      .field-grass {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 75%;
        background: linear-gradient(to top, #27ae60 0%, #229954 100%);
        border-radius: 15px;
      }

      .field-dirt {
        position: absolute;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
        width: 50%;
        height: 50%;
        background: #d4a373;
        border-radius: 50%;
        opacity: 0.7;
      }

      .position-slot {
        position: absolute;
        width: 80px;
        height: 80px;
        border: 3px dashed rgba(255,255,255,0.5);
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        color: white;
        font-weight: bold;
      }

      .position-slot:hover {
        background: rgba(255,255,255,0.2);
        border-color: rgba(255,255,255,0.8);
        transform: scale(1.1);
      }

      .position-slot.filled {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: 3px solid white;
      }

      .position-label {
        font-size: 12px;
        margin-bottom: 5px;
      }

      .player-name {
        font-size: 10px;
        text-align: center;
        max-width: 70px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* 포지션별 위치 */
      .pos-P { bottom: 15%; left: 50%; transform: translateX(-50%); }
      .pos-C { bottom: 5%; left: 50%; transform: translateX(-50%); }
      .pos-1B { bottom: 30%; right: 15%; }
      .pos-2B { bottom: 45%; right: 30%; }
      .pos-3B { bottom: 30%; left: 15%; }
      .pos-SS { bottom: 45%; left: 30%; }
      .pos-LF { top: 15%; left: 15%; }
      .pos-CF { top: 10%; left: 50%; transform: translateX(-50%); }
      .pos-RF { top: 15%; right: 15%; }

      .player-pool {
        max-height: 500px;
        overflow-y: auto;
      }

      .player-item {
        background: white;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid transparent;
      }

      .player-item:hover {
        transform: translateX(5px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        border-color: #667eea;
      }

      .player-item.selected {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .player-item.in-lineup {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .stat-mini {
        display: inline-block;
        padding: 2px 8px;
        background: #f8f9fa;
        border-radius: 5px;
        font-size: 11px;
        margin-right: 5px;
        margin-top: 5px;
      }

      .player-item.selected .stat-mini {
        background: rgba(255,255,255,0.2);
      }

      .team-stats-card {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        color: white;
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 20px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.2);
      }

      .stat-row:last-child {
        border-bottom: none;
      }

      .action-buttons {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .btn-save-team {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        border: none;
        color: white;
        padding: 15px 30px;
        font-weight: bold;
        border-radius: 10px;
        transition: all 0.3s ease;
      }

      .btn-save-team:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(17, 153, 142, 0.4);
      }

      .btn-clear {
        background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
        border: none;
        color: white;
        padding: 15px 30px;
        font-weight: bold;
        border-radius: 10px;
      }

      .team-selector {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
      }

      .batting-order {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 25px;
        height: 25px;
        background: #f39c12;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
        color: white;
        border: 2px solid white;
      }

      .lineup-list {
        background: white;
        border-radius: 10px;
        padding: 20px;
        margin-top: 20px;
      }

      .lineup-item {
        display: flex;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #e9ecef;
      }

      .lineup-item:last-child {
        border-bottom: none;
      }

      .order-badge {
        width: 30px;
        height: 30px;
        background: #667eea;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        margin-right: 15px;
      }
    </style>
  </head>
  <body>
    <th:block layout:fragment="contents">
      <div class="container-fluid team-builder-container py-5">
        <h1 class="display-4 mb-4">
          <i class="bi bi-people-fill"></i> 팀 빌더
        </h1>

        <!-- 팀 선택/생성 -->
        <div class="team-selector">
          <div class="row align-items-center">
            <div class="col-md-6">
              <label class="form-label mb-2">내 팀 선택</label>
              <select id="teamSelect" class="form-select form-select-lg">
                <option value="">새 팀 만들기</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label mb-2">팀 이름</label>
              <input type="text" id="teamName" class="form-control form-control-lg" placeholder="팀 이름을 입력하세요" value="나의 드림팀">
            </div>
          </div>
        </div>

        <div class="row">
          <!-- 왼쪽: 야구장 & 팀 통계 -->
          <div class="col-lg-8">
            <!-- 야구장 -->
            <div class="card mb-4">
              <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="bi bi-diagram-3"></i> 라인업 배치</h5>
              </div>
              <div class="card-body p-4">
                <div class="baseball-field">
                  <div class="field-grass"></div>
                  <div class="field-dirt"></div>

                  <!-- 포지션 슬롯들 -->
                  <div class="position-slot pos-P" data-position="P">
                    <div class="position-label">P</div>
                    <div class="player-name"></div>
                  </div>
                  <div class="position-slot pos-C" data-position="C">
                    <div class="position-label">C</div>
                    <div class="player-name"></div>
                  </div>
                  <div class="position-slot pos-1B" data-position="1B">
                    <div class="position-label">1B</div>
                    <div class="player-name"></div>
                  </div>
                  <div class="position-slot pos-2B" data-position="2B">
                    <div class="position-label">2B</div>
                    <div class="player-name"></div>
                  </div>
                  <div class="position-slot pos-3B" data-position="3B">
                    <div class="position-label">3B</div>
                    <div class="player-name"></div>
                  </div>
                  <div class="position-slot pos-SS" data-position="SS">
                    <div class="position-label">SS</div>
                    <div class="player-name"></div>
                  </div>
                  <div class="position-slot pos-LF" data-position="LF">
                    <div class="position-label">LF</div>
                    <div class="player-name"></div>
                  </div>
                  <div class="position-slot pos-CF" data-position="CF">
                    <div class="position-label">CF</div>
                    <div class="player-name"></div>
                  </div>
                  <div class="position-slot pos-RF" data-position="RF">
                    <div class="position-label">RF</div>
                    <div class="player-name"></div>
                  </div>
                </div>

                <div class="text-center mt-3 text-muted">
                  <small>선수를 클릭한 후 포지션을 클릭하여 배치하세요</small>
                </div>
              </div>
            </div>

            <!-- 팀 통계 -->
            <div class="team-stats-card">
              <h5 class="mb-3"><i class="bi bi-bar-chart-fill"></i> 팀 전체 능력치</h5>
              <div class="stat-row">
                <span>평균 파워</span>
                <strong id="avgPower">0.0</strong>
              </div>
              <div class="stat-row">
                <span>평균 컨택트</span>
                <strong id="avgContact">0.0</strong>
              </div>
              <div class="stat-row">
                <span>평균 스피드</span>
                <strong id="avgSpeed">0.0</strong>
              </div>
              <div class="stat-row">
                <span>평균 수비력</span>
                <strong id="avgFielding">0.0</strong>
              </div>
              <div class="stat-row">
                <span>평균 어깨</span>
                <strong id="avgArm">0.0</strong>
              </div>
              <div class="stat-row" style="border-top: 2px solid white; padding-top: 15px; margin-top: 10px;">
                <span style="font-size: 18px;">종합 평점</span>
                <strong id="totalRating" style="font-size: 24px;">0.0</strong>
              </div>
            </div>

            <!-- 액션 버튼 -->
            <div class="action-buttons">
              <button id="saveTeamBtn" class="btn btn-save-team flex-fill">
                <i class="bi bi-save"></i> 팀 저장
              </button>
              <button id="clearLineupBtn" class="btn btn-clear">
                <i class="bi bi-x-circle"></i> 라인업 초기화
              </button>
            </div>
          </div>

          <!-- 오른쪽: 선수 풀 -->
          <div class="col-lg-4">
            <div class="card">
              <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-person-lines-fill"></i> 보유 선수 (<span id="playerCount">0</span>명)</h5>
              </div>
              <div class="card-body">
                <div class="player-pool" id="playerPool">
                  <!-- 선수 목록이 여기에 표시됩니다 -->
                </div>
              </div>
            </div>

            <!-- 현재 라인업 -->
            <div class="lineup-list">
              <h6 class="mb-3"><i class="bi bi-list-ol"></i> 타순</h6>
              <div id="lineupOrder">
                <p class="text-muted text-center">선수를 배치하세요</p>
              </div>
            </div>
          </div>
        </div>

        <a th:href="@{/customPlayer}" class="btn btn-secondary mt-4">
          <i class="bi bi-arrow-left"></i> 돌아가기
        </a>
      </div>
    </th:block>

    <th:block layout:fragment="scripts">
      <script>
        let allPlayers = [];
        let currentLineup = {}; // { position: { playerId, playerName, order } }
        let selectedPlayer = null;
        let currentTeamId = null;

        $(document).ready(function() {
          loadTeams();
          loadPlayers();

          // 팀 선택 이벤트
          $('#teamSelect').on('change', function() {
            const teamId = $(this).val();
            if (teamId) {
              loadTeam(teamId);
            } else {
              clearLineup();
              $('#teamName').val('나의 드림팀');
              currentTeamId = null;
            }
          });

          // 포지션 슬롯 클릭 이벤트
          $('.position-slot').on('click', function() {
            if (!selectedPlayer) {
              alert('먼저 선수를 선택하세요.');
              return;
            }

            const position = $(this).data('position');
            assignPlayerToPosition(selectedPlayer, position);
          });

          // 초기화 버튼
          $('#clearLineupBtn').on('click', function() {
            if (confirm('라인업을 초기화하시겠습니까?')) {
              clearLineup();
            }
          });

          // 저장 버튼
          $('#saveTeamBtn').on('click', function() {
            saveTeam();
          });
        });

        // 팀 목록 로드
        function loadTeams() {
          $.ajax({
            url: '/api/custom-teams',
            method: 'GET',
            data: { userId: 1 },
            success: function(response) {
              if (response.success && response.data) {
                const select = $('#teamSelect');
                response.data.forEach(function(team) {
                  select.append(`<option value="${team.id}">${team.teamName}</option>`);
                });
              }
            }
          });
        }

        // 팀 로드
        function loadTeam(teamId) {
          $.ajax({
            url: `/api/custom-teams/${teamId}`,
            method: 'GET',
            success: function(response) {
              if (response.success && response.data) {
                const team = response.data;
                currentTeamId = team.id;
                $('#teamName').val(team.teamName);

                // 라인업 복원
                clearLineup();
                if (team.lineup) {
                  team.lineup.forEach(function(pos) {
                    const player = {
                      id: pos.playerId,
                      playerName: pos.playerName,
                      level: pos.level,
                      power: pos.power,
                      contact: pos.contact,
                      speed: pos.speed,
                      fielding: pos.fielding,
                      arm: pos.arm
                    };
                    currentLineup[pos.position] = {
                      playerId: pos.playerId,
                      playerName: pos.playerName,
                      order: pos.battingOrder,
                      player: player
                    };
                    updatePositionSlot(pos.position, player, pos.battingOrder);
                  });
                  updateLineupOrder();
                  updateTeamStats();
                  updatePlayerPoolStatus();
                }
              }
            }
          });
        }

        // 선수 목록 로드
        function loadPlayers() {
          $.ajax({
            url: '/api/custom-players/trainable',
            method: 'GET',
            data: { userId: 1 },
            success: function(response) {
              if (response.success && response.players) {
                allPlayers = response.players;
                displayPlayers(allPlayers);
                $('#playerCount').text(allPlayers.length);
              }
            },
            error: function() {
              $('#playerPool').html('<p class="text-muted text-center">선수를 불러오는데 실패했습니다.</p>');
            }
          });
        }

        // 선수 목록 표시
        function displayPlayers(players) {
          const pool = $('#playerPool');
          pool.empty();

          if (players.length === 0) {
            pool.html('<p class="text-muted text-center">보유 선수가 없습니다.</p>');
            return;
          }

          players.forEach(function(player) {
            const isInLineup = Object.values(currentLineup).some(p => p.playerId === player.id);
            const inLineupClass = isInLineup ? 'in-lineup' : '';

            const playerHtml = `
              <div class="player-item ${inLineupClass}" data-player-id="${player.id}">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <strong>${player.playerName}</strong>
                    <small class="text-muted"> (Lv.${player.level})</small>
                  </div>
                  ${isInLineup ? '<span class="badge bg-success">배치됨</span>' : ''}
                </div>
                <div class="mt-2">
                  <span class="stat-mini">파워 ${player.power}</span>
                  <span class="stat-mini">컨택 ${player.contact}</span>
                  <span class="stat-mini">속도 ${player.speed}</span>
                  <span class="stat-mini">수비 ${player.fielding}</span>
                  <span class="stat-mini">어깨 ${player.arm}</span>
                </div>
              </div>
            `;

            const $item = $(playerHtml);
            if (!isInLineup) {
              $item.on('click', function() {
                if ($(this).hasClass('in-lineup')) return;

                $('.player-item').removeClass('selected');
                $(this).addClass('selected');
                selectedPlayer = player;
              });
            }
            pool.append($item);
          });
        }

        // 선수 배치
        function assignPlayerToPosition(player, position) {
          // 이미 다른 포지션에 배치된 경우 제거
          for (let pos in currentLineup) {
            if (currentLineup[pos].playerId === player.id) {
              removePlayerFromPosition(pos);
            }
          }

          // 타순 자동 할당 (빈 타순 중 가장 작은 번호)
          let order = 1;
          const usedOrders = Object.values(currentLineup).map(p => p.order);
          while (usedOrders.includes(order) && order <= 9) {
            order++;
          }

          if (order > 9) {
            alert('라인업이 가득 찼습니다. (최대 9명)');
            return;
          }

          currentLineup[position] = {
            playerId: player.id,
            playerName: player.playerName,
            order: order,
            player: player
          };

          updatePositionSlot(position, player, order);
          updateLineupOrder();
          updateTeamStats();
          updatePlayerPoolStatus();

          // 선택 해제
          $('.player-item').removeClass('selected');
          selectedPlayer = null;
        }

        // 포지션에서 선수 제거
        function removePlayerFromPosition(position) {
          delete currentLineup[position];
          const $slot = $(`.position-slot[data-position="${position}"]`);
          $slot.removeClass('filled');
          $slot.find('.player-name').text('');
          $slot.find('.batting-order').remove();
        }

        // 포지션 슬롯 업데이트
        function updatePositionSlot(position, player, order) {
          const $slot = $(`.position-slot[data-position="${position}"]`);
          $slot.addClass('filled');
          $slot.find('.player-name').text(player.playerName);

          // 타순 배지 추가
          $slot.find('.batting-order').remove();
          $slot.append(`<div class="batting-order">${order}</div>`);

          // 우클릭으로 제거
          $slot.off('contextmenu').on('contextmenu', function(e) {
            e.preventDefault();
            if (confirm(`${player.playerName}을(를) 라인업에서 제거하시겠습니까?`)) {
              removePlayerFromPosition(position);
              updateLineupOrder();
              updateTeamStats();
              updatePlayerPoolStatus();
            }
          });
        }

        // 타순 목록 업데이트
        function updateLineupOrder() {
          const $order = $('#lineupOrder');
          $order.empty();

          const sorted = Object.entries(currentLineup)
            .map(([position, data]) => ({ position, ...data }))
            .sort((a, b) => a.order - b.order);

          if (sorted.length === 0) {
            $order.html('<p class="text-muted text-center">선수를 배치하세요</p>');
            return;
          }

          sorted.forEach(function(item) {
            const html = `
              <div class="lineup-item">
                <div class="order-badge">${item.order}</div>
                <div class="flex-fill">
                  <strong>${item.playerName}</strong>
                  <small class="text-muted"> (${item.position})</small>
                </div>
              </div>
            `;
            $order.append(html);
          });
        }

        // 팀 통계 업데이트
        function updateTeamStats() {
          if (Object.keys(currentLineup).length === 0) {
            $('#avgPower').text('0.0');
            $('#avgContact').text('0.0');
            $('#avgSpeed').text('0.0');
            $('#avgFielding').text('0.0');
            $('#avgArm').text('0.0');
            $('#totalRating').text('0.0');
            return;
          }

          const players = Object.values(currentLineup).map(p => p.player);
          const count = players.length;

          const avgPower = players.reduce((sum, p) => sum + p.power, 0) / count;
          const avgContact = players.reduce((sum, p) => sum + p.contact, 0) / count;
          const avgSpeed = players.reduce((sum, p) => sum + p.speed, 0) / count;
          const avgFielding = players.reduce((sum, p) => sum + p.fielding, 0) / count;
          const avgArm = players.reduce((sum, p) => sum + p.arm, 0) / count;
          const totalRating = (avgPower + avgContact + avgSpeed + avgFielding + avgArm) / 5;

          $('#avgPower').text(avgPower.toFixed(1));
          $('#avgContact').text(avgContact.toFixed(1));
          $('#avgSpeed').text(avgSpeed.toFixed(1));
          $('#avgFielding').text(avgFielding.toFixed(1));
          $('#avgArm').text(avgArm.toFixed(1));
          $('#totalRating').text(totalRating.toFixed(1));
        }

        // 선수 풀 상태 업데이트
        function updatePlayerPoolStatus() {
          displayPlayers(allPlayers);
        }

        // 라인업 초기화
        function clearLineup() {
          currentLineup = {};
          $('.position-slot').removeClass('filled');
          $('.position-slot .player-name').text('');
          $('.position-slot .batting-order').remove();
          updateLineupOrder();
          updateTeamStats();
          updatePlayerPoolStatus();
        }

        // 팀 저장
        function saveTeam() {
          const teamName = $('#teamName').val().trim();
          if (!teamName) {
            alert('팀 이름을 입력하세요.');
            return;
          }

          if (Object.keys(currentLineup).length === 0) {
            alert('최소 1명 이상의 선수를 배치하세요.');
            return;
          }

          const lineup = Object.entries(currentLineup).map(([position, data]) => ({
            battingOrder: data.order,
            position: position,
            playerId: data.playerId
          }));

          const requestData = {
            teamName: teamName,
            description: `${Object.keys(currentLineup).length}명으로 구성된 팀`,
            lineup: lineup
          };

          const url = currentTeamId ? `/api/custom-teams/${currentTeamId}` : '/api/custom-teams';
          const method = currentTeamId ? 'PUT' : 'POST';

          $.ajax({
            url: url,
            method: method,
            contentType: 'application/json',
            data: JSON.stringify(requestData),
            success: function(response) {
              if (response.success) {
                alert(response.message);
                if (!currentTeamId && response.data) {
                  currentTeamId = response.data.id;
                  $('#teamSelect').append(`<option value="${response.data.id}" selected>${response.data.teamName}</option>`);
                }
              }
            },
            error: function(xhr) {
              const error = xhr.responseJSON;
              alert(error?.message || '팀 저장에 실패했습니다.');
            }
          });
        }
      </script>
    </th:block>
  </body>
</html>
