<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/default}"
>
  <head>
    <title>선수 목록 - BaseBall LOCK</title>
  </head>
  <body>
    <th:block layout:fragment="contents">
      <div class="container py-5">
        <h1 class="display-4 mb-4">
          <i class="bi bi-list-ul"></i> 선수 목록 (테이블 뷰)
        </h1>

        <div class="table-responsive">
          <table class="table table-striped table-hover">
            <thead class="table-dark">
              <tr>
                <th>이름</th>
                <th>포지션</th>
                <th>레벨</th>
                <th>파워</th>
                <th>정확도</th>
                <th>스피드</th>
                <th>수비</th>
                <th>작업</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${players == null or #lists.isEmpty(players)}">
                <td colspan="8" class="text-center text-muted">
                  선수가 없습니다.
                </td>
              </tr>
              <tr th:each="player : ${players}">
                <td th:text="${player.name}">선수명</td>
                <td th:text="${player.position}">포지션</td>
                <td th:text="${player.level}">레벨</td>
                <td th:text="${player.power}">파워</td>
                <td th:text="${player.contact}">정확도</td>
                <td th:text="${player.speed}">스피드</td>
                <td th:text="${player.fielding}">수비</td>
                <td>
                  <a th:href="@{/customPlayer/edit/{id}(id=${player.id})}" class="btn btn-sm btn-primary">수정</a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <a th:href="@{/customPlayer}" class="btn btn-secondary">
          <i class="bi bi-arrow-left"></i> 돌아가기
        </a>
      </div>
    </th:block>
  </body>
</html>
