<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/default}">
<th:block layout:fragment="contents">
    <div class="container-fluid py-5 px-3">

        <!-- 개인랭킹 / 팀랭킹 링크 + 시즌 선택 드롭다운 -->
        <div class="d-flex align-items-center mb-4 mx-4">
		    <a href="/ranking/teamranking-view" class="btn btn-accent me-2">팀 랭킹</a>
		    <a href="/ranking/playerranking-view" class="btn btn-accent">개인 랭킹</a>
            <form class="d-flex align-items-center px-4 seasonSelectBox">
                <select class="form-select season-select" name="season" style="width:120px;" onchange="changeSeason(this)">
                </select>
            </form>
            <input type="hidden" id="current-sort" value="WAR">
            <input type="hidden" id="current-direction" value="DESC">
        </div>

        <!-- 타자 / 투수 Top 영역 -->
        <div class="row gy-4 mx-5 mb-5">
            <div class="col-lg-6">
                <div class="card border-point shadow-sm p-3">
                    <h5 class="text-center fs-2 fw-bold mb-3">포지션별 타자 WAR Top</h5>
                    <ul id="top-batter-list" class="list-group border-0"></ul>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card border-point shadow-sm p-3">
                    <h5 class="text-center fs-2 fw-bold mb-3">기록별 투수 Top</h5>
                    <ul id="top-pitcher-list" class="list-group border-0"></ul>
                </div>
            </div>
        </div>

        <!-- 버튼 및 포지션 드롭다운 -->
        <div class="text-start mb-3 mx-4 d-flex flex-wrap align-items-center gap-2">
            <button id="showBatterTableBtn" class="btn btn-accent">타자 기록</button>
            <button id="showPitcherTableBtn" class="btn btn-accent">투수 기록</button>
            <button id="showDefenseTableBtn" class="btn btn-accent">수비 기록</button>
            <button id="showRunnerTableBtn" class="btn btn-accent">주루 기록</button>
            <form class="d-flex align-items-center seasonSelectBox">
                <select class="form-select season-select" name="season" style="width:120px;" onchange="changeSeason(this)">
                </select>
            </form>
            <form id="positionChoiceBox" class="d-flex align-items-center">
                <select id="position-select" class="form-select" onchange="filterByPosition()">
                    <option value="">모든 포지션</option>
                    <option value="C">C (포수)</option>
                    <option value="1B">1B (1루수)</option>
                    <option value="2B">2B (2루수)</option>
                    <option value="3B">3B (3루수)</option>
                    <option value="SS">SS (유격수)</option>
                    <option value="LF">LF (좌익수)</option>
                    <option value="RF">RF (우익수)</option>
                    <option value="CF">CF (중견수)</option>
                    <option value="DH">DH (지명타자)</option>
                </select>
            </form>
            <button id="filterQualifiedBtn" class="btn btn-accent">규정 선수만 보기 / 현재 : 전체선수</button>

            <!-- 선수 검색 -->
            <div class="d-flex align-items-center">
                <input type="text" id="player-search" class="form-control" placeholder="선수명 검색..." style="width: 150px;" onkeyup="searchPlayer()" />
                <button type="button" class="btn btn-outline-secondary ms-1" onclick="clearSearch()" title="검색 초기화">
                    ✕
                </button>
            </div>
        </div>

        <!-- 기록 테이블 -->
        <div id="batter-ranking-table-wrapper" class="ranking-table mt-2 mx-5"></div>
        <div id="pitcher-ranking-table-wrapper" class="ranking-table mt-2 mx-5 d-none"></div>
        <div id="defense-ranking-table-wrapper" class="ranking-table mt-2 mx-5 d-none"></div>
        <div id="runner-ranking-table-wrapper" class="ranking-table mt-2 mx-5 d-none"></div>

        <!-- 페이지네이션 -->
        <div id="batter-pagination" class="d-flex justify-content-center mt-4"></div>
        <div id="pitcher-pagination" class="d-flex justify-content-center mt-4 d-none"></div>
        <div id="defense-pagination" class="d-flex justify-content-center mt-4 d-none"></div>
        <div id="runner-pagination" class="d-flex justify-content-center mt-4 d-none"></div>
    </div>
</th:block>

<th:block layout:fragment="script">
<script>
	// 시즌 드롭다운 동적 생성 (2022 ~ 현재 연도)
	(function() {
	  var currentYear = new Date().getFullYear();
	  var minYear = 2022;
	  var defaultSeason = currentYear - 1;
	  document.querySelectorAll('select.season-select').forEach(function(select) {
	    for (var y = currentYear; y >= minYear; y--) {
	      var opt = document.createElement('option');
	      opt.value = y;
	      opt.textContent = y;
	      if (y === defaultSeason) opt.selected = true;
	      select.appendChild(opt);
	    }
	  });
	})();

	let isQualifiedFilterOn = false;
	let currentTab = 'batter';
	let currentBatterData = [];
	let currentPitcherData = [];
	let currentDefenseData = [];
	let currentRunnerData = [];
	let filteredBatterData = [];
	let filteredPitcherData = [];
	let filteredDefenseData = [];
	let filteredRunnerData = [];
	let batterCurrentPage = 1;
	let pitcherCurrentPage = 1;
	let defenseCurrentPage = 1;
	let runnerCurrentPage = 1;
	const itemsPerPage = 15;

	$(document).ready(function() {
	    // 화면 처음 로딩 시
	    fetchPlayerRanking();

	    // 탭 전환 함수
	    function switchTab(tab) {
	        currentTab = tab;
	        // 모든 테이블/페이지네이션 숨기기
	        $('#batter-ranking-table-wrapper, #pitcher-ranking-table-wrapper, #defense-ranking-table-wrapper, #runner-ranking-table-wrapper').addClass('d-none');
	        $('#batter-pagination, #pitcher-pagination, #defense-pagination, #runner-pagination').addClass('d-none');

	        // 선택한 탭만 표시
	        $('#' + tab + '-ranking-table-wrapper').removeClass('d-none');
	        $('#' + tab + '-pagination').removeClass('d-none');

	        // 포지션 필터: 타자/수비 탭만 표시
	        if (tab === 'batter' || tab === 'defense') {
	            $('#positionChoiceBox').removeClass('d-none');
	        } else {
	            $('#positionChoiceBox').addClass('d-none');
	        }

	        // 규정 선수 필터: 타자/투수 탭만 표시
	        if (tab === 'batter' || tab === 'pitcher') {
	            $('#filterQualifiedBtn').removeClass('d-none');
	        } else {
	            $('#filterQualifiedBtn').addClass('d-none');
	        }
	    }

	    // 버튼 클릭 시 탭 전환
	    $('#showBatterTableBtn').click(function() { switchTab('batter'); });
	    $('#showPitcherTableBtn').click(function() { switchTab('pitcher'); });
	    $('#showDefenseTableBtn').click(function() { switchTab('defense'); });
	    $('#showRunnerTableBtn').click(function() { switchTab('runner'); });

	    // 시즌 드롭다운 초기화
	    var selectedValue = getSelectedSeason();
	    $('select[name="season"]').val(selectedValue);

	 	// 규정 선수 보기
		$('#filterQualifiedBtn').click(function() {
		    isQualifiedFilterOn = !isQualifiedFilterOn;

		    if (isQualifiedFilterOn) {
		        $(this).text('전체 선수 보기 / 현재 : 규정선수');
		    } else {
		        $(this).text('규정 선수만 보기 / 현재 : 전체선수');
		    }

		    const selectedSeason = $('select[name="season"]').val();
		    fetchPlayerRanking(selectedSeason);
		});
	});

	// 시즌 변경
	function changeSeason(selectElement) {
	    var selectedValue = $(selectElement).val();
	    $('.season-select').val(selectedValue);
	    fetchPlayerRanking(selectedValue);
	}

	// 초기 시즌 값 설정
	function getSelectedSeason() {
	    var seasonSelect = document.querySelector('select[name="season"]');
	    return seasonSelect ? seasonSelect.value : String(new Date().getFullYear() - 1);
	}

	// 포지션 필터링
	function filterByPosition() {
	    var searchTerm = $('#player-search').val().toLowerCase().trim();

	    // 타자 필터
	    if (searchTerm === '') {
	        filteredBatterData = [...currentBatterData];
	    } else {
	        filteredBatterData = currentBatterData.filter(function(player) {
	            return player.playerName && player.playerName.toLowerCase().includes(searchTerm);
	        });
	    }

	    var selectedPosition = $('#position-select').val();
	    if (selectedPosition) {
	        filteredBatterData = filteredBatterData.filter(function(player) {
	            return player.position === selectedPosition;
	        });
	    }

	    // 수비 필터
	    if (searchTerm === '') {
	        filteredDefenseData = [...currentDefenseData];
	    } else {
	        filteredDefenseData = currentDefenseData.filter(function(player) {
	            return player.playerName && player.playerName.toLowerCase().includes(searchTerm);
	        });
	    }

	    if (selectedPosition) {
	        filteredDefenseData = filteredDefenseData.filter(function(player) {
	            return player.position === selectedPosition;
	        });
	    }

	    batterCurrentPage = 1;
	    defenseCurrentPage = 1;
	    var currentSort = $('#current-sort').val();
	    var currentDirection = $('#current-direction').val();
	    renderBatterTable(filteredBatterData, currentSort, currentDirection);
	    renderDefenseTable(filteredDefenseData, currentSort, currentDirection);
	}

	// 선수 랭킹 가져오기
	function fetchPlayerRanking(season) {
	    if (!season) {
	        season = $('select[name="season"]').val();
	    }

	    var currentSort = $('#current-sort').val();
	    var currentDirection = $('#current-direction').val();

	    $.ajax({
	        url: '/api/player-rankings/playerranking-view-json',
	        method: 'GET',
	        data: {
	        	season: season,
	        	sort: currentSort,
	        	direction: currentDirection,
	        	qualified: isQualifiedFilterOn,
	        	},
	        success: function(data) {
	            renderTopBatterList(data.topBatters);
	            renderTopPitcherList(data.topPitchers);
	            currentBatterData = data.batterRankingList;
	            currentPitcherData = data.pitcherRankingList;
	            currentDefenseData = data.defenseRankingList || [];
	            currentRunnerData = data.runnerRankingList || [];
	            filteredBatterData = [...currentBatterData];
	            filteredPitcherData = [...currentPitcherData];
	            filteredDefenseData = [...currentDefenseData];
	            filteredRunnerData = [...currentRunnerData];
	            batterCurrentPage = 1;
	            pitcherCurrentPage = 1;
	            defenseCurrentPage = 1;
	            runnerCurrentPage = 1;
	            renderBatterTable(filteredBatterData, data.currentSort, data.sortDirection);
	            renderPitcherTable(filteredPitcherData, data.currentSort, data.sortDirection);
	            renderDefenseTable(filteredDefenseData, data.currentSort, data.sortDirection);
	            renderRunnerTable(filteredRunnerData, data.currentSort, data.sortDirection);
	        },
	        error: function(xhr, status, error) {
	            console.error('데이터 불러오기 실패:', error);
	            alert('데이터를 불러오는 데 실패했습니다.');
	        }
	    });
	}

	// 타자 Top 리스트
	function renderTopBatterList(list) {
	    var html = '';
	    list.forEach(function(batter) {
	        html += '<li class="list-group-item d-flex justify-content-between">';
	        html += '<span class="fs-5">' + (batter.position || '-') + '</span>';
	        html += '<span class="d-flex align-items-center">';
	        html += '<img src="' + getLogoPath(batter.logoName) + '" style="width:28px;height:28px;">';
	        html += '<span class="ms-1 fs-5">' + batter.teamName + '</span>';
	        html += '<span class="ms-2 fs-5">' + batter.playerName + '</span>';
	        html += '<strong class="ms-1 fs-5">' + formatDecimal(batter.war, 2) + '</strong>';
	        html += '</span></li>';
	    });
	    $('#top-batter-list').html(html);
	}

	// 투수 Top 리스트
	function renderTopPitcherList(list) {
	    var html = '';
	    list.forEach(function(pitcher) {
	        var formatClass = getFormatClassForCategory(pitcher.category);
	        html += '<li class="list-group-item d-flex justify-content-between">';
	        html += '<span class="fs-5">' + (pitcher.category || '-') + '</span>';
	        html += '<span class="d-flex align-items-center fs-5">';
	        html += '<img src="' + getLogoPath(pitcher.logoName) + '" style="width:28px;height:28px;">';
	        html += '<span class="ms-1">' + pitcher.teamName + '</span>';
	        html += '<span class="ms-2">' + pitcher.playerName + '</span>';
	        html += '<strong class="ms-1 ' + formatClass + '">' + pitcher.value + '</strong>';
	        html += '</span></li>';
	    });
	    $('#top-pitcher-list').html(html);
	    formatPlayerStats();
	}

	// 타자 테이블 정렬
	function sortBatterTable(sortKey) {
	    sortKey = sortKey.toUpperCase();
	    var season = $('.season-select').val();
	    var currentSort = $('#current-sort').val();
	    var currentDirection = $('#current-direction').val();

	    var newDirection = (currentSort === sortKey && currentDirection === 'ASC') ? 'DESC' : 'ASC';

	    $.ajax({
	        url: '/api/player-rankings/playerranking-view-json',
	        method: 'GET',
	        data: {
	            season: season,
	            sort: sortKey,
	            direction: newDirection,
	            qualified: isQualifiedFilterOn
	        },
	        success: function(data) {
	            $('#current-sort').val(sortKey);
	            $('#current-direction').val(newDirection);
	            currentBatterData = data.batterRankingList;
	            filteredBatterData = [...currentBatterData];
	            applyCurrentFilters();
	            batterCurrentPage = 1;
	            renderBatterTable(filteredBatterData, sortKey, newDirection);
	        },
	        error: function(xhr, status, error) {
	            console.error('타자 테이블 정렬 실패:', error);
	        }
	    });
	}

	// 타자 테이블 그리기
	function renderBatterTable(list, currentSort, sortDirection) {
	    var directionArrow = sortDirection === 'ASC' ? '▼' : '▲';

	    var totalItems = list.length;
	    var totalPages = Math.ceil(totalItems / itemsPerPage);
	    var startIndex = (batterCurrentPage - 1) * itemsPerPage;
	    var endIndex = startIndex + itemsPerPage;
	    var currentPageData = list.slice(startIndex, endIndex);

	    var html = '<div class="table-responsive"><table class="table table-bordered table-striped text-center" style="min-width: 2200px;"><thead><tr>';

	    html += '<th>순위</th>';
	    html += '<th>선수명</th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'position\')">포지션' + (currentSort === 'POSITION' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'WAR\')">WAR' + (currentSort === 'WAR' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'G\')">경기' + (currentSort === 'G' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'PA\')">타석' + (currentSort === 'PA' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'AB\')">타수' + (currentSort === 'AB' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'AVG\')">타율' + (currentSort === 'AVG' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'H\')">안타' + (currentSort === 'H' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'2B\')">2루타' + (currentSort === '2B' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'3B\')">3루타' + (currentSort === '3B' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'HR\')">홈런' + (currentSort === 'HR' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'RBI\')">타점' + (currentSort === 'RBI' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'R\')">득점' + (currentSort === 'R' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'SB\')">도루' + (currentSort === 'SB' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'BB\')">볼넷' + (currentSort === 'BB' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'IBB\')">고의4구' + (currentSort === 'IBB' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'HBP\')">사구' + (currentSort === 'HBP' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'SO\')">삼진' + (currentSort === 'SO' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'GDP\')">병살' + (currentSort === 'GDP' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'SAC\')">희번' + (currentSort === 'SAC' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'SF\')">희플' + (currentSort === 'SF' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'TB\')">루타' + (currentSort === 'TB' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'OBP\')">출루율' + (currentSort === 'OBP' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'SLG\')">장타율' + (currentSort === 'SLG' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'OPS\')">OPS' + (currentSort === 'OPS' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'WRCPLUS\')">wRC+' + (currentSort === 'WRCPLUS' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'BABIP\')">BABIP' + (currentSort === 'BABIP' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'ISO\')">ISO' + (currentSort === 'ISO' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'K_RATE\')">K%' + (currentSort === 'K_RATE' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'BB_RATE\')">BB%' + (currentSort === 'BB_RATE' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'MH\')">멀티히트' + (currentSort === 'MH' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'RISP\')">득점권' + (currentSort === 'RISP' ? directionArrow : '') + '</a></th>';
	    html += '<th><a href="javascript:void(0);" onclick="sortBatterTable(\'PH_BA\')">대타' + (currentSort === 'PH_BA' ? directionArrow : '') + '</a></th>';
	    html += '</tr></thead><tbody>';

	    currentPageData.forEach(function(batter, index) {
	        var actualRank = startIndex + index + 1;
	        html += '<tr>';
	        html += '<td>' + actualRank + '</td>';
	        html += '<td class="d-flex align-items-center gap-2"><img src="' + getLogoPath(batter.logoName) + '" style="width:28px;height:28px;">' + batter.playerName + '</td>';
	        html += '<td>' + (batter.position || '-') + '</td>';
	        html += '<td>' + formatDecimal(batter.war, 2) + '</td>';
	        html += '<td>' + formatInteger(batter.g) + '</td>';
	        html += '<td>' + formatInteger(batter.pa) + '</td>';
	        html += '<td>' + formatInteger(batter.ab) + '</td>';
	        html += '<td>' + formatDecimal(batter.avg, 3) + '</td>';
	        html += '<td>' + formatInteger(batter.h) + '</td>';
	        html += '<td>' + formatInteger(batter.twoB) + '</td>';
	        html += '<td>' + formatInteger(batter.threeB) + '</td>';
	        html += '<td>' + formatInteger(batter.hr) + '</td>';
	        html += '<td>' + formatInteger(batter.rbi) + '</td>';
	        html += '<td>' + formatInteger(batter.r) + '</td>';
	        html += '<td>' + formatInteger(batter.sb) + '</td>';
	        html += '<td>' + formatInteger(batter.bb) + '</td>';
	        html += '<td>' + formatInteger(batter.ibb) + '</td>';
	        html += '<td>' + formatInteger(batter.hbp) + '</td>';
	        html += '<td>' + formatInteger(batter.so) + '</td>';
	        html += '<td>' + formatInteger(batter.gdp) + '</td>';
	        html += '<td>' + formatInteger(batter.sac) + '</td>';
	        html += '<td>' + formatInteger(batter.sf) + '</td>';
	        html += '<td>' + formatInteger(batter.tb) + '</td>';
	        html += '<td>' + formatDecimal(batter.obp, 3) + '</td>';
	        html += '<td>' + formatDecimal(batter.slg, 3) + '</td>';
	        html += '<td>' + formatDecimal(batter.ops, 3) + '</td>';
	        html += '<td>' + formatDecimal(batter.wrcPlus, 1) + '</td>';
	        html += '<td>' + formatDecimal(batter.babip, 3) + '</td>';
	        html += '<td>' + formatDecimal(batter.iso, 3) + '</td>';
	        html += '<td>' + formatDecimal(batter.kRate, 1) + '</td>';
	        html += '<td>' + formatDecimal(batter.bbRate, 1) + '</td>';
	        html += '<td>' + formatInteger(batter.mh) + '</td>';
	        html += '<td>' + formatDecimal(batter.risp, 3) + '</td>';
	        html += '<td>' + formatDecimal(batter.phBa, 3) + '</td>';
	        html += '</tr>';
	    });

	    html += '</tbody></table></div>';
	    $('#batter-ranking-table-wrapper').html(html);
	    renderBatterPagination(totalPages);
	}

	// 투수 테이블 정렬

	// 공통 유틸
	function getLogoPath(logoName) {
	    return '/static/emblems/' + logoName + '.svg';
	}

	function formatInteger(value) {
	    if (value == null || isNaN(value)) return '-';
	    return Math.round(value);
	}

	function formatDecimal(value, decimals) {
	    if (value == null || isNaN(value)) return '-';
	    return parseFloat(value).toFixed(decimals);
	}

	function formatPlayerStats() {
	    document.querySelectorAll('.format-decimal-2').forEach(function(td) {
	        var value = parseFloat(td.innerText);
	        if (!isNaN(value)) td.innerText = value.toFixed(2);
	    });
	    document.querySelectorAll('.format-decimal-3').forEach(function(td) {
	        var value = parseFloat(td.innerText);
	        if (!isNaN(value)) td.innerText = value.toFixed(3);
	    });
	    document.querySelectorAll('.format-decimal-1').forEach(function(td) {
	        var value = parseFloat(td.innerText);
	        if (!isNaN(value)) td.innerText = value.toFixed(1);
	    });
	    document.querySelectorAll('.format-integer').forEach(function(td) {
	        var value = parseFloat(td.innerText);
	        if (!isNaN(value)) td.innerText = Math.round(value);
	    });
	}

	function getFormatClassForCategory(category) {
	    if (!category) return 'format-decimal-2';
	    var upper = category.toUpperCase();
	    if (['ERA', 'WHIP', 'WAR', 'BetterWAR', 'PitcherWAR'].includes(upper)) return 'format-decimal-2';
	    if (['OPS', 'AVG'].includes(upper)) return 'format-decimal-3';
	    if (upper === 'IP') return 'format-decimal-1';
	    if (['W', 'L', 'SV', 'HLD', 'SO', 'BB', 'H', 'HR', 'G', 'SB', 'RBI', '2B', '3B'].includes(upper)) return 'format-integer';
	    return 'format-decimal-2';
	}

	// 페이지네이션 공통 함수
	function renderPaginationHtml(currentPage, totalPages, changeFunc, label) {
	    if (totalPages <= 1) return '';

	    var html = '<nav aria-label="' + label + ' 페이지네이션"><ul class="pagination pagination-sm">';

	    if (currentPage > 1) {
	        html += '<li class="page-item"><a class="page-link text-secondary" href="javascript:void(0);" onclick="' + changeFunc + '(' + (currentPage - 1) + ')">이전</a></li>';
	    } else {
	        html += '<li class="page-item disabled"><span class="page-link text-muted">이전</span></li>';
	    }

	    var startPage = Math.max(1, currentPage - 2);
	    var endPage = Math.min(totalPages, currentPage + 2);

	    if (startPage > 1) {
	        html += '<li class="page-item"><a class="page-link text-dark" href="javascript:void(0);" onclick="' + changeFunc + '(1)">1</a></li>';
	        if (startPage > 2) html += '<li class="page-item disabled"><span class="page-link text-muted">...</span></li>';
	    }

	    for (var i = startPage; i <= endPage; i++) {
	        if (i === currentPage) {
	            html += '<li class="page-item active"><span class="page-link text-white" style="background-color:#166534;border-color:#166534;">' + i + '</span></li>';
	        } else {
	            html += '<li class="page-item"><a class="page-link text-dark" href="javascript:void(0);" onclick="' + changeFunc + '(' + i + ')">' + i + '</a></li>';
	        }
	    }

	    if (endPage < totalPages) {
	        if (endPage < totalPages - 1) html += '<li class="page-item disabled"><span class="page-link text-muted">...</span></li>';
	        html += '<li class="page-item"><a class="page-link text-dark" href="javascript:void(0);" onclick="' + changeFunc + '(' + totalPages + ')">' + totalPages + '</a></li>';
	    }

	    if (currentPage < totalPages) {
	        html += '<li class="page-item"><a class="page-link text-secondary" href="javascript:void(0);" onclick="' + changeFunc + '(' + (currentPage + 1) + ')">다음</a></li>';
	    } else {
	        html += '<li class="page-item disabled"><span class="page-link text-muted">다음</span></li>';
	    }

	    html += '</ul></nav>';
	    return html;
	}

	function renderBatterPagination(totalPages) {
	    $('#batter-pagination').html(renderPaginationHtml(batterCurrentPage, totalPages, 'changeBatterPage', '타자'));
	}
	function renderPitcherPagination(totalPages) {
	    $('#pitcher-pagination').html(renderPaginationHtml(pitcherCurrentPage, totalPages, 'changePitcherPage', '투수'));
	}
	function renderDefensePagination(totalPages) {
	    $('#defense-pagination').html(renderPaginationHtml(defenseCurrentPage, totalPages, 'changeDefensePage', '수비'));
	}
	function renderRunnerPagination(totalPages) {
	    $('#runner-pagination').html(renderPaginationHtml(runnerCurrentPage, totalPages, 'changeRunnerPage', '주루'));
	}

	// 페이지 변경 함수
	function changeBatterPage(page) {
	    batterCurrentPage = page;
	    var currentSort = $('#current-sort').val();
	    var currentDirection = $('#current-direction').val();
	    renderBatterTable(filteredBatterData, currentSort, currentDirection);
	}
	function changePitcherPage(page) {
	    pitcherCurrentPage = page;
	    var currentSort = $('#current-sort').val();
	    var currentDirection = $('#current-direction').val();
	    renderPitcherTable(filteredPitcherData, currentSort, currentDirection);
	}
	function changeDefensePage(page) {
	    defenseCurrentPage = page;
	    var currentSort = $('#current-sort').val();
	    var currentDirection = $('#current-direction').val();
	    renderDefenseTable(filteredDefenseData, currentSort, currentDirection);
	}
	function changeRunnerPage(page) {
	    runnerCurrentPage = page;
	    var currentSort = $('#current-sort').val();
	    var currentDirection = $('#current-direction').val();
	    renderRunnerTable(filteredRunnerData, currentSort, currentDirection);
	}

	// 선수 검색 기능
	function searchPlayer() {
	    var searchTerm = $('#player-search').val().toLowerCase().trim();

	    if (searchTerm === '') {
	        filteredBatterData = [...currentBatterData];
	        filteredPitcherData = [...currentPitcherData];
	        filteredDefenseData = [...currentDefenseData];
	        filteredRunnerData = [...currentRunnerData];
	    } else {
	        filteredBatterData = currentBatterData.filter(function(player) {
	            return player.playerName && player.playerName.toLowerCase().includes(searchTerm);
	        });
	        filteredPitcherData = currentPitcherData.filter(function(player) {
	            return player.playerName && player.playerName.toLowerCase().includes(searchTerm);
	        });
	        filteredDefenseData = currentDefenseData.filter(function(player) {
	            return player.playerName && player.playerName.toLowerCase().includes(searchTerm);
	        });
	        filteredRunnerData = currentRunnerData.filter(function(player) {
	            return player.playerName && player.playerName.toLowerCase().includes(searchTerm);
	        });
	    }

	    applyPositionFilter();

	    batterCurrentPage = 1;
	    pitcherCurrentPage = 1;
	    defenseCurrentPage = 1;
	    runnerCurrentPage = 1;

	    var currentSort = $('#current-sort').val();
	    var currentDirection = $('#current-direction').val();
	    renderBatterTable(filteredBatterData, currentSort, currentDirection);
	    renderPitcherTable(filteredPitcherData, currentSort, currentDirection);
	    renderDefenseTable(filteredDefenseData, currentSort, currentDirection);
	    renderRunnerTable(filteredRunnerData, currentSort, currentDirection);
	}

	function clearSearch() {
	    $('#player-search').val('');
	    searchPlayer();
	}

	// 현재 적용된 모든 필터 재적용
	function applyCurrentFilters() {
	    var searchTerm = $('#player-search').val().toLowerCase().trim();
	    if (searchTerm !== '') {
	        filteredBatterData = currentBatterData.filter(function(player) {
	            return player.playerName && player.playerName.toLowerCase().includes(searchTerm);
	        });
	        filteredPitcherData = currentPitcherData.filter(function(player) {
	            return player.playerName && player.playerName.toLowerCase().includes(searchTerm);
	        });
	        filteredDefenseData = currentDefenseData.filter(function(player) {
	            return player.playerName && player.playerName.toLowerCase().includes(searchTerm);
	        });
	        filteredRunnerData = currentRunnerData.filter(function(player) {
	            return player.playerName && player.playerName.toLowerCase().includes(searchTerm);
	        });
	    }
	    applyPositionFilter();
	}

	// 포지션 필터 적용
	function applyPositionFilter() {
	    var selectedPosition = $('#position-select').val();
	    if (selectedPosition) {
	        filteredBatterData = filteredBatterData.filter(function(player) {
	            return player.position === selectedPosition;
	        });
	        filteredDefenseData = filteredDefenseData.filter(function(player) {
	            return player.position === selectedPosition;
	        });
	    }
	}
</script>
</th:block>
</html>
