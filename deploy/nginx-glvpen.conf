# glvpen Nginx 설정
# /etc/nginx/sites-available/glvpen 에 배치

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name glvpen.duckdns.org;
    return 301 https://$host$request_uri;
}

# HTTPS 서버 (SSL은 Certbot이 자동 설정)
server {
    listen 443 ssl;
    server_name glvpen.duckdns.org;

    # SSL 인증서 (Certbot이 자동 생성)
    # ssl_certificate /etc/letsencrypt/live/glvpen.duckdns.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/glvpen.duckdns.org/privkey.pem;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 업로드 크기 제한
    client_max_body_size 10M;

    # 정적 리소스 캐싱
    location /static/ {
        proxy_pass http://localhost:8080/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Spring Boot 프록시
    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 지원 (필요 시)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
